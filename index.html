        </div>

      </div>
    </div>
  </div>`;
}

function selectMeeting(id){activeMeeting=id;renderMeetings();}

function addMeetingType(){
  const label=prompt('Meeting type name (e.g. "Manufacturing"):');
  if(!label||!label.trim())return;
  initMeetingTypes();
  const colors=['#1D9E75','#D85A30','#378ADD','#7F77DD','#D4537E','#BA7517','#639922','#888780'];
  const icons=['📋','💬','🔧','📊','📦','💼','🗂','⚙'];
  const id='mt_'+Date.now();
  const idx=state.meetingTypes.length;
  state.meetingTypes.push({id,label:label.trim(),color:colors[idx%colors.length],icon:icons[idx%icons.length]});
  state.meetingData[id]={history:[],tasks:[],attendees:[],recap:''};
  activeMeeting=id;
  scheduleSave();renderMeetings();
}
function updateMeetingTypeName(id,val){
  const t=state.meetingTypes.find(x=>x.id===id);if(!t)return;
  t.label=val;scheduleSave();
}
function deleteMeetingType(id){
  if(!confirm('Delete this meeting type and all its history?'))return;
  state.meetingTypes=state.meetingTypes.filter(x=>x.id!==id);
  delete state.meetingData[id];
  activeMeeting=state.meetingTypes.length?state.meetingTypes[0].id:null;
  scheduleSave();renderMeetings();
}
function toggleRoomAttendee(mid,name){
  initMeetingTypes();
  const data=state.meetingData[mid];if(!data)return;
  if(!data.attendees)data.attendees=[];
  const idx=data.attendees.indexOf(name);
  if(idx>=0)data.attendees.splice(idx,1);else data.attendees.push(name);
  scheduleSave();renderMeetings();
}
function addRoomEntry(mid){
  const ta=document.getElementById('roomEntry_'+mid);
  const dateEl=document.getElementById('roomEntryDate_'+mid);
  const text=ta?ta.value.trim():'';if(!text)return;
  const data=state.meetingData[mid];if(!data)return;
  if(!data.history)data.history=[];
  data.history.push({text,date:dateEl?dateEl.value:new Date().toISOString().slice(0,10)});
  if(ta)ta.value='';
  scheduleSave();renderMeetings();
  // Scroll history to bottom after render
  setTimeout(()=>{
    const hEl=document.querySelector(`#meetingsView .act-history`);
    if(hEl)hEl.scrollTop=hEl.scrollHeight;
  },50);
}
function deleteRoomEntry(mid,idx){
  const data=state.meetingData[mid];if(!data||!data.history)return;
  data.history.splice(idx,1);scheduleSave();renderMeetings();
}
function addRoomTask(mid){
  const inp=document.getElementById('roomNewTask_'+mid);
  const text=inp?inp.value.trim():'';
  const data=state.meetingData[mid];if(!data)return;
  if(!data.tasks)data.tasks=[];
  data.tasks.push({text:text||'',done:false,owner:'',projId:''});
  if(inp)inp.value='';
  scheduleSave();renderMeetings();
}
function toggleRoomTask(mid,i){
  const data=state.meetingData[mid];if(!data||!data.tasks[i])return;
  data.tasks[i].done=!data.tasks[i].done;scheduleSave();renderMeetings();
}
function updateRoomTask(mid,i,field,val){
  const data=state.meetingData[mid];if(!data||!data.tasks[i])return;
  if(val==='__add__'){addOwner();return;}
  data.tasks[i][field]=val;scheduleSave();
}
function assignRoomTask(mid,i,pid){
  const data=state.meetingData[mid];if(!data||!data.tasks[i])return;
  data.tasks[i].projId=pid;
  if(pid){
    const p=state.projects.find(pr=>pr.id===pid);
    if(p){
      const ph=p.phases[p.activePhase]||p.phases[0];
      if(!p.tasks[ph])p.tasks[ph]=[];
      const mt=state.meetingTypes.find(x=>x.id===mid);
      p.tasks[ph].push({id:'t'+Date.now(),text:data.tasks[i].text,type:'task',done:false,
        highlighted:false,subtasks:[],note:'From meeting: '+(mt?mt.label:''),files:[],badge:'none',due:'none',subsCollapsed:false,doneAt:0});
      showToast('Added to '+p.name);
    }
  }
  scheduleSave();
}
function removeRoomTask(mid,i){
  const data=state.meetingData[mid];if(!data)return;
  data.tasks.splice(i,1);scheduleSave();renderMeetings();
}
function updateRoomRecap(mid,val){
  const data=state.meetingData[mid];if(!data)return;
  data.recap=val;scheduleSave();
}
function addOwner(){
  const name=prompt('Enter name:');if(!name||!name.trim())return;
  if(!state.extraOwners)state.extraOwners=[];
  if(!state.extraOwners.includes(name.trim()))state.extraOwners.push(name.trim());
  scheduleSave();renderMeetings();
}
function buildRoomRecap(mid){
  initMeetingTypes();
  const mt=state.meetingTypes.find(x=>x.id===mid);
  const data=state.meetingData[mid]||{};
  const last=(data.history||[]).slice(-3).map(e=>`${e.date}: ${e.text}`).join('\n');
  const tasks=(data.tasks||[]).filter(t=>!t.done).map(t=>`  ○ ${t.text}${t.owner?' — '+t.owner:''}`).join('\n');
  const done=(data.tasks||[]).filter(t=>t.done).map(t=>`  ✓ ${t.text}`).join('\n');
  return`${mt?mt.icon+' ':''} MEETING RECAP: ${mt?mt.label:'Meeting'}
Date: ${new Date().toLocaleDateString()}
${'─'.repeat(44)}

${last?'RECENT ACTIVITY:\n'+last+'\n\n':''}${data.recap?'SUMMARY:\n'+data.recap+'\n\n':''}${tasks?'OPEN ACTION ITEMS:\n'+tasks+'\n\n':''}${done?'COMPLETED:\n'+done+'\n':''}`.trim();
}
function copyRoomRecap(mid){
  navigator.clipboard.writeText(buildRoomRecap(mid)).then(()=>showToast('Recap copied!'));
}
function previewRoomRecap(mid){
  const text=buildRoomRecap(mid);
  const div=document.createElement('div');
  div.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center';
  div.innerHTML=`<div style="background:var(--surface);border-radius:var(--radius);padding:24px;width:560px;max-height:80vh;display:flex;flex-direction:column;gap:12px;box-shadow:0 12px 40px rgba(0,0,0,.2)">
    <div style="display:flex;align-items:center;gap:10px"><span style="font-size:14px;font-weight:600;flex:1">Recap Preview</span><button class="btn sm" onclick="this.closest('[style*=fixed]').remove()">✕</button></div>
    <pre style="flex:1;overflow-y:auto;font-size:12px;font-family:var(--mono);background:var(--bg);padding:12px;border-radius:var(--radius-sm);white-space:pre-wrap;line-height:1.6;max-height:50vh">${esc(text)}</pre>
    <div style="display:flex;gap:8px">
      <button class="btn dark" onclick="copyRoomRecap('${mid}');this.closest('[style*=fixed]').remove()">⎘ Copy</button>
      <button class="btn" onclick="sendRoomEmail('${mid}')">✉ Send Email</button>
    </div>
  </div>`;
  document.body.appendChild(div);
}
function sendRoomEmail(mid){
  initMeetingTypes();
  const data=state.meetingData[mid]||{};
  const selected=data.attendees||[];
  if(!selected.length){showToast('Select attendees first using the buttons in the header');return;}
  const toEmails=MTG_ATTENDEES.filter(a=>selected.includes(a.name)).map(a=>a.email);
  if(!toEmails.length){showToast('No emails found for selected attendees');return;}
  if(!scriptUrl){showToast('Connect to Sheets first');return;}
  const mt=state.meetingTypes.find(x=>x.id===mid);
  const subject=(mt?mt.label:'Meeting')+' Recap — '+new Date().toLocaleDateString();
  const body=buildRoomRecap(mid);

  // Use JSONP GET instead of POST no-cors — same method as the working daily reminder script
  const cb='emailCb_'+Date.now();
  const payload=encodeURIComponent(JSON.stringify({to:toEmails.join(','),subject,body}));
  const url=scriptUrl+(scriptUrl.includes('?')?'&':'?')+'action=sendEmail&data='+payload+'&callback='+cb;

  setSyncBadge('busy');
  window[cb]=function(res){
    delete window[cb];
    if(document.querySelector('[data-jsonp="'+cb+'"]'))document.querySelector('[data-jsonp="'+cb+'"]').remove();
    setSyncBadge('ok');
    if(res&&res.ok||res&&res.status==='ok'){
      const div=document.createElement('div');
      div.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center';
      div.innerHTML=`<div style="background:var(--surface);border-radius:var(--radius);padding:28px 32px;width:380px;display:flex;flex-direction:column;gap:14px;box-shadow:0 12px 40px rgba(0,0,0,.3);text-align:center">
        <div style="font-size:40px">✉️</div>
        <div style="font-size:16px;font-weight:700;color:var(--text)">Email Sent!</div>
        <div style="font-size:13px;color:var(--text2);line-height:1.6">Recap sent to:<br><strong>${toEmails.join('<br>')}</strong></div>
        <button class="btn dark" onclick="this.closest('[style*=fixed]').remove()" style="justify-content:center;padding:10px;font-size:14px">Done</button>
      </div>`;
      document.body.appendChild(div);
    } else {
      showToast('Email error: '+(res&&res.message||res&&res.error||'unknown'));
    }
  };

  const s=document.createElement('script');
  s.src=url;
  s.setAttribute('data-jsonp',cb);
  s.onerror=function(){
    delete window[cb];s.remove();setSyncBadge('err');
    showToast('Script load failed — check Apps Script URL');
  };
  document.head.appendChild(s);
}

// 2-WEEK STRIP + CALENDAR
const calCollapsed={week:false,someday:false,unsched:true};

function renderWeekStrip(){
  const el=document.getElementById('weekGrid');if(!el)return;
  const now=new Date();
  const todayStr=now.toDateString();
  const dayOfWeek=now.getDay();
  const mondayOffset=dayOfWeek===0?-6:1-dayOfWeek;
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  // Build per-day task lists (deduplicated by task id)
  const dayTaskMap={}; // key: date string, value: [{text,color}]
  const seenIds=new Set();
  state.projects.forEach(p=>{p.phases.forEach(ph=>{(p.tasks[ph]||[]).filter(t=>!t.done).forEach(t=>{
    if(seenIds.has(t.id))return;seenIds.add(t.id);
    // If task has a specific scheduledDate, show on that day
    if(t.scheduledDate){
      const k=new Date(t.scheduledDate+'T00:00:00').toDateString();
      if(!dayTaskMap[k])dayTaskMap[k]=[];
      dayTaskMap[k].push({text:t.text,color:p.color});
    } else if(t.due==='today'){
      if(!dayTaskMap[todayStr])dayTaskMap[todayStr]=[];
      dayTaskMap[todayStr].push({text:t.text,color:p.color});
    } else if(t.due==='week'){
      // Spread week tasks across Mon-Fri of current week evenly
      // For display, show on the nearest upcoming weekday
      const d=new Date(now);
      const dow=d.getDay();
      // Show on tomorrow or first weekday if weekend
      const targetOffset=dow===0?1:dow===6?2:1;
      const target=new Date(d);target.setDate(d.getDate()+targetOffset);
      const k=target.toDateString();
      if(!dayTaskMap[k])dayTaskMap[k]=[];
      dayTaskMap[k].push({text:t.text,color:p.color});
    }
  });});});

  const cells=[];
  for(let w=0;w<2;w++){
    for(let d=0;d<7;d++){
      const offset=mondayOffset+(w*7)+d;
      const date=new Date(now);date.setDate(now.getDate()+offset);
      const isToday=date.toDateString()===todayStr;
      const dayKey=date.toDateString();
      const tasks=dayTaskMap[dayKey]||[];
      const dots=tasks.slice(0,3).map(t=>`<div style="display:flex;align-items:center;gap:2px;width:100%">
        <span style="width:5px;height:5px;border-radius:50%;background:${isToday?'rgba(255,255,255,.7)':t.color};flex-shrink:0"></span>
        <span style="font-size:9px;color:${isToday?'rgba(255,255,255,.85)':'var(--text2)'};line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${esc(t.text.slice(0,14))}</span>
      </div>`).join('');
      const more=tasks.length>3?`<div style="font-size:9px;opacity:.6;color:${isToday?'#fff':'var(--text3)'}">+${tasks.length-3}</div>`:'';
      const isDarkMode=document.body.classList.contains('dark');
      const todayBg=isToday?(isDarkMode?'#4f4f47':'#1c1b18'):'var(--surface)';
      const todayTextColor=isToday?'#fff':(isDarkMode?'var(--text)':'var(--text)');
      cells.push(`<div style="display:flex;flex-direction:column;border-radius:6px;padding:6px 5px 4px;background:${todayBg};border:1.5px solid ${isToday?'transparent':tasks.length?'var(--border-md)':'var(--border)'};min-height:68px;cursor:default;overflow:hidden">
        <div style="display:flex;align-items:baseline;gap:3px;margin-bottom:3px">
          <span style="font-size:9px;font-weight:600;color:${isToday?'rgba(255,255,255,.6)':'var(--text3)'};text-transform:uppercase">${days[d]}</span>

}

// DUE DATES
function cycleDue(id){
  const p=getProj();const ph=viewingHighlights?findTaskPhase(id):getPhaseKey();
  const t=(p.tasks[ph]||[]).find(t=>t.id===id);if(!t)return;
  const idx=DUE_CYCLE.indexOf(t.due||'none');
  t.due=DUE_CYCLE[(idx+1)%DUE_CYCLE.length];
  if(viewingHighlights)renderTasksHighlights();else renderTasks(p);scheduleSave();
}
function cycleDueById(pid,ph,tid){
  const p=state.projects.find(pr=>pr.id===pid);if(!p)return;
  const t=(p.tasks[ph]||[]).find(t=>t.id===tid);if(!t)return;
  const idx=DUE_CYCLE.indexOf(t.due||'none');
  t.due=DUE_CYCLE[(idx+1)%DUE_CYCLE.length];
  renderCalendar();scheduleSave();
}

function renderCalendar(){
  renderWeekStrip();
  const now=new Date();
  const todayStr=now.toDateString();
  const seenIds=new Set();
  const buckets={today:[],week:[],someday:[],none:[]};
  state.projects.forEach(p=>{p.phases.forEach(ph=>{(p.tasks[ph]||[]).forEach(t=>{
    if(t.done||seenIds.has(t.id))return;
    seenIds.add(t.id);
    const due=t.due||'none';
    // If task has a scheduledDate that is today, show in Today
    if(t.scheduledDate){
      const sd=new Date(t.scheduledDate+'T00:00:00');
      if(sd.toDateString()===todayStr){buckets.today.push({t,p,ph});}
      else{buckets.week.push({t,p,ph});}
      return;
    }
    if(buckets[due])buckets[due].push({t,p,ph});
    else buckets.none.push({t,p,ph});
  });});});

  const renderCalTask=(t,p,ph,ctx)=>{
    const subs=t.subtasks||[];
    const allSubsDone=subs.length===0||subs.every(s=>s.done);
    const recurLabel=t.recur?`<span style="font-size:9px;background:var(--q-bg);color:var(--q-text);border-radius:3px;padding:1px 6px;border:1px solid var(--q-border);flex-shrink:0">↻ ${t.recur}</span>`:'';
    return`<div class="cal-task-card" id="cal_tc_${t.id}_${ctx}">
      <div class="cal-task-main" style="padding-right:6px">
        <input type="checkbox" class="cal-cb" onchange="calToggleTask('${p.id}','${ph}','${t.id}')" onclick="event.stopPropagation()"/>
        <span class="cal-proj-dot" style="background:${p.color}"></span>
        <span class="cal-task-text" onclick="navToTask('${p.id}','${ph}','${t.id}')" style="cursor:pointer;flex:1;text-decoration:none" title="Go to task in project">${esc(t.text)}</span>
        ${recurLabel}
        <span class="cal-proj-label">${esc(p.name)}</span>
        <span class="due-badge due-${t.due||'none'}" onclick="cycleDueById('${p.id}','${ph}','${t.id}')" style="flex-shrink:0;cursor:pointer">${DUE_LABELS[t.due||'none']}</span>
        <button onclick="calDoneAll('${p.id}','${ph}','${t.id}')" title="Mark all done & archive" style="background:#16a34a;border:none;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;cursor:pointer;flex-shrink:0;font-family:var(--font);white-space:nowrap">✓ Done</button>
        <button onclick="calDeleteTask('${p.id}','${ph}','${t.id}')" title="Delete task" style="background:none;border:1px solid var(--border-md);color:var(--text3);font-size:12px;padding:2px 5px;border-radius:4px;cursor:pointer;flex-shrink:0;line-height:1">×</button>
      </div>
      ${subs.length?`<div class="cal-subtasks">${subs.map(s=>`<div class="cal-sub-row"><input type="checkbox" class="cal-sub-cb" ${s.done?'checked':''} onchange="calToggleSub('${p.id}','${ph}','${t.id}','${s.id}')"/><span class="${s.done?'done':''}" style="font-size:12px;color:var(--text2);flex:1">${esc(s.text)}</span></div>`).join('')}<div class="cal-add-sub"><input class="cal-sub-inp" id="calsub_${t.id}_${ctx}" placeholder="+ subtask..." onkeydown="if(event.key==='Enter')calAddSub('${p.id}','${ph}','${t.id}','${ctx}')"/></div></div>`:`<div class="cal-add-sub" style="padding-left:46px"><input class="cal-sub-inp" id="calsub_${t.id}_${ctx}" placeholder="+ subtask..." onkeydown="if(event.key==='Enter')calAddSub('${p.id}','${ph}','${t.id}','${ctx}')"/></div>`}
    </div>`;
  };

  const sh=(label,color,border,key,count)=>
    `<div style="font-size:13px;font-weight:800;color:${color};text-transform:uppercase;letter-spacing:.04em;padding-bottom:7px;border-bottom:3px solid ${border};display:flex;align-items:center;gap:7px;margin-bottom:6px">
      ${key?`<span onclick="calCollapsed['${key}']=!calCollapsed['${key}'];renderCalendar()" style="cursor:pointer;user-select:none">${calCollapsed[key]?'▶':'▼'}</span>`:''}
      ${label}${count!==undefined?`<span style="font-size:11px;font-weight:500;opacity:.6">${count}</span>`:''}
    </div>`;

  // LEFT column sections
  const todaySec=document.getElementById('calTodaySection');
  const weekSec=document.getElementById('calWeekSection');
  const somedaySec=document.getElementById('calSomedaySection');
  const unschedSec=document.getElementById('calUnschedSection');

  if(todaySec)todaySec.innerHTML=`${sh('📅 Today — '+now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}),'#dc2626','#fca5a5',null)}${buckets.today.length?buckets.today.map(({t,p,ph})=>renderCalTask(t,p,ph,'today')).join(''):'<div style="font-size:13px;color:var(--text3);font-style:italic;padding:4px 0">No tasks due today</div>'}`;
  if(weekSec)weekSec.innerHTML=`${sh('📆 This Week','#b45309','#fcd34d','week',buckets.week.length)}${calCollapsed.week?'':(buckets.week.length?buckets.week.map(({t,p,ph})=>renderCalTask(t,p,ph,'week')).join(''):'<div style="font-size:13px;color:var(--text3);font-style:italic;padding:4px 0">No tasks this week</div>')}`;
  if(somedaySec)somedaySec.innerHTML=`${sh('🗓 Someday','#525252','#d4d4d4','someday',buckets.someday.length)}${calCollapsed.someday?'':(buckets.someday.length?buckets.someday.map(({t,p,ph})=>renderCalTask(t,p,ph,'someday')).join(''):'<div style="font-size:13px;color:var(--text3);font-style:italic;padding:4px 0">Nothing planned yet</div>')}`;
  if(unschedSec)unschedSec.innerHTML=`${sh('Unscheduled','#71717a','#e4e4e7','unsched',buckets.none.length)}${calCollapsed.unsched?'':(buckets.none.length?buckets.none.map(({t,p,ph})=>renderCalTask(t,p,ph,'unsched')).join(''):'<div style="font-size:13px;color:var(--text3);font-style:italic;padding:4px 0">All scheduled ✓</div>')}`;

  // RIGHT: quick-add
  const projOptions=state.projects.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
  // Quick-add: date drives the bucket automatically — no separate due selector
  const qaEl=document.getElementById('calQaSticky');
  if(qaEl)qaEl.innerHTML=`
    <div style="font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">＋ Quick Add Task</div>
    <input id="calQaText" style="font-size:14px;padding:8px 11px;border-radius:var(--radius-sm);border:1.5px solid var(--border-md);background:var(--bg);color:var(--text);font-family:var(--font);outline:none;width:100%;margin-bottom:7px" placeholder="Task name..." onkeydown="if(event.key==='Enter')calQuickAdd()"/>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
      <select id="calQaProject" onchange="calQaUpdatePhases()" style="font-size:12px;padding:6px 8px;border-radius:var(--radius-sm);border:1px solid var(--border-md);background:var(--bg);color:var(--text);font-family:var(--font);outline:none">${projOptions}</select>
      <select id="calQaPhase" style="font-size:12px;padding:6px 8px;border-radius:var(--radius-sm);border:1px solid var(--border-md);background:var(--bg);color:var(--text);font-family:var(--font);outline:none"></select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">
      <div style="display:flex;flex-direction:column;gap:2px">
        <label style="font-size:10px;color:var(--text3);font-weight:600">Date <span style="font-weight:400;opacity:.7">(sets bucket auto)</span></label>
        <input type="date" id="calQaDate" value="${now.toISOString().slice(0,10)}" onchange="calQaAutoDate()" style="font-size:12px;padding:6px 7px;border-radius:var(--radius-sm);border:1px solid var(--border-md);background:var(--bg);color:var(--text);font-family:var(--font);outline:none;width:100%"/>
        <div id="calQaDateLabel" style="font-size:10px;color:var(--accent);font-weight:600;padding:1px 2px">📅 Today</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:2px">
        <label style="font-size:10px;color:var(--text3);font-weight:600">Repeat</label>
        <select id="calQaRecur" style="font-size:12px;padding:6px 7px;border-radius:var(--radius-sm);border:1px solid var(--border-md);background:var(--bg);color:var(--text);font-family:var(--font);outline:none">
          <option value="">No repeat</option><option value="daily">Every day</option>
          <option value="weekly">Every week</option><option value="monday">Every Monday</option>
          <option value="tuesday">Every Tuesday</option><option value="wednesday">Every Wednesday</option>
          <option value="thursday">Every Thursday</option><option value="friday">Every Friday</option>
          <option value="monthly">Every month</option>
        </select>
      </div>
    </div>
    <button class="btn dark" onclick="calQuickAdd()" style="width:100%;justify-content:center;font-size:13px;padding:9px">Add Task</button>`;
  setTimeout(calQaUpdatePhases,50);
}

function calQaUpdatePhases(){
  const pid=document.getElementById('calQaProject')?.value;
  const sel=document.getElementById('calQaPhase');if(!sel)return;
  const p=state.projects.find(pr=>pr.id===pid);
  if(!p){sel.innerHTML='';return;}
  sel.innerHTML=p.phases.map(ph=>`<option value="${esc(ph)}">${esc(ph)}</option>`).join('');
}

// Auto-label the date picker with bucket name
function calQaAutoDate(){
  const dateEl=document.getElementById('calQaDate');
  const label=document.getElementById('calQaDateLabel');
  if(!dateEl||!label)return;
  const val=dateEl.value;
  if(!val){label.textContent='';return;}
  const picked=new Date(val+'T00:00:00');
  const now=new Date();
  const todayStr=now.toDateString();
  const diffDays=Math.round((picked-new Date(now.toDateString()))/(1000*60*60*24));
  let bucket,lbl;
  if(diffDays<0){bucket='none';lbl='⬅ Past date';}
  else if(diffDays===0){bucket='today';lbl='📅 Today';}
  else if(diffDays<=6){bucket='week';lbl='📆 This Week';}
  else if(diffDays<=30){bucket='someday';lbl='🗓 Upcoming';}
  else{bucket='none';lbl='📌 Future';}
  label.textContent=lbl;
  label.style.color=bucket==='today'?'#dc2626':bucket==='week'?'#b45309':'var(--text3)';
}

function calQuickAdd(){
  const text=document.getElementById('calQaText')?.value.trim();if(!text)return;
  const pid=document.getElementById('calQaProject')?.value;
  const ph=document.getElementById('calQaPhase')?.value;
  const dateVal=document.getElementById('calQaDate')?.value||new Date().toISOString().slice(0,10);
  const recur=document.getElementById('calQaRecur')?.value||'';
  const p=state.projects.find(pr=>pr.id===pid);if(!p)return;

  // Derive bucket from date automatically
  const picked=new Date(dateVal+'T00:00:00');
  const now=new Date();
  const diffDays=Math.round((picked-new Date(now.toDateString()))/(1000*60*60*24));
  let due;
  if(diffDays<=0)due='today';
  else if(diffDays<=6)due='week';
  else if(diffDays<=30)due='someday';
  else due='none';

  if(!p.tasks[ph])p.tasks[ph]=[];
  p.tasks[ph].push({id:'t'+Date.now(),text,type:'task',done:false,highlighted:false,
    subtasks:[],note:'',files:[],badge:'none',due,scheduledDate:dateVal,
    subsCollapsed:false,doneAt:0,recur:recur||null});
  document.getElementById('calQaText').value='';
  // Reset date to today and re-label
  const newDate=new Date().toISOString().slice(0,10);
  document.getElementById('calQaDate').value=newDate;
  calQaAutoDate();
  scheduleSave();renderCalendar();renderWeekStrip();
  showToast('Added to '+p.name+' → '+ph+' ('+due+')');
}

// Mark all subtasks done + archive the task
function calDoneAll(pid,ph,tid){
  const p=state.projects.find(pr=>pr.id===pid);if(!p)return;
  const t=(p.tasks[ph]||[]).find(t=>t.id===tid);if(!t)return;
  (t.subtasks||[]).forEach(s=>s.done=true);
  t.done=true;t.doneAt=Date.now();
  if(!p.archive)p.archive=[];
  p.archive.push({...t,archivedAt:Date.now(),archivedFrom:ph});
  p.tasks[ph]=(p.tasks[ph]||[]).filter(x=>x.id!==tid);
  if(t.recur){
    const next={...t,id:'t'+Date.now(),done:false,doneAt:0};
    delete next.archivedAt;delete next.archivedFrom;
    next.due=t.recur==='daily'?'today':'week';
    p.tasks[ph].push(next);
  }
  scheduleSave();renderCalendar();renderWeekStrip();
  showToast('Task completed & archived');
}

// Delete task from calendar without archiving
function calDeleteTask(pid,ph,tid){
  const p=state.projects.find(pr=>pr.id===pid);if(!p)return;
  p.tasks[ph]=(p.tasks[ph]||[]).filter(x=>x.id!==tid);
  scheduleSave();renderCalendar();renderWeekStrip();
  showToast('Task deleted');
}
function calToggleSub(pid,ph,tid,sid){
  const p=state.projects.find(pr=>pr.id===pid);if(!p)return;
  const t=(p.tasks[ph]||[]).find(t=>t.id===tid);if(!t)return;
  const s=(t.subtasks||[]).find(s=>s.id===sid);if(!s)return;
  s.done=!s.done;
  scheduleSave();renderCalendar();
}
function calAddSub(pid,ph,tid,ctx){
  const inp=document.getElementById('calsub_'+tid+'_'+ctx);
  if(!inp)return;
  const v=inp.value.trim();if(!v)return;
  const p=state.projects.find(pr=>pr.id===pid);if(!p)return;
  const t=(p.tasks[ph]||[]).find(t=>t.id===tid);if(!t)return;
  if(!t.subtasks)t.subtasks=[];
  t.subtasks.push({id:'s'+Date.now(),text:v,done:false});
  inp.value='';
  scheduleSave();renderCalendar();
}

function calToggleTask(pid,ph,tid){
  const p=state.projects.find(pr=>pr.id===pid);if(!p)return;
  const t=(p.tasks[ph]||[]).find(t=>t.id===tid);if(!t)return;
  const subs=t.subtasks||[];
  if(subs.length&&!subs.every(s=>s.done)){showToast('Complete all subtasks first, or use ✓ Done All');return;}
  calDoneAll(pid,ph,tid);
}

// ARCHIVE
function archiveTask(id){
  const p=getProj();const ph=viewingHighlights?findTaskPhase(id):getPhaseKey();
  const tasks=p.tasks[ph]||[];const idx=tasks.findIndex(t=>t.id===id);if(idx<0)return;
  const[t]=tasks.splice(idx,1);
  if(!p.archive)p.archive=[];
  p.archive.push({...t,archivedAt:Date.now(),archivedFrom:ph});
  delete expandedTasks[id];
  if(viewingHighlights)renderTasksHighlights();else{renderTasks(p);renderPhases(p);}
  scheduleSave();showToast('Task archived');
}
function restoreTask(pid,arcIdx){
  const p=state.projects.find(pr=>pr.id===pid);if(!p||!p.archive)return;
  const[t]=p.archive.splice(arcIdx,1);
  const ph=t.archivedFrom||p.phases[0];
  if(!p.tasks[ph])p.tasks[ph]=[];
  delete t.archivedAt;delete t.archivedFrom;
  p.tasks[ph].push(t);
  renderArchive();scheduleSave();showToast('Task restored');
}
function renderArchive(){
  const el=document.getElementById('archiveView');
  const byProj={};
  state.projects.forEach(p=>{
    (p.archive||[]).forEach((t,i)=>{
      if(!byProj[p.id])byProj[p.id]={p,items:[]};
      byProj[p.id].items.push({t,arcIdx:i});
    });
  });
  const entries=Object.values(byProj);
  if(!entries.length){el.innerHTML='<div style="text-align:center;padding:40px 0;font-size:13px;color:var(--text3)">No archived tasks yet.<br><br>Right-click any task → Archive to move it here.</div>';return;}
  el.innerHTML=entries.map(({p,items})=>`
    <div class="archive-section-head"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.color};margin-right:6px"></span>${esc(p.name)}</div>
    ${items.map(({t,arcIdx})=>`
      <div class="archive-row">
        <span class="archive-text">${esc(t.text)}</span>
        <span class="archive-proj">${esc(t.archivedFrom||'')}</span>
        <button class="archive-restore" onclick="restoreTask('${p.id}',${arcIdx})">↩ Restore</button>
      </div>`).join('')}`).join('');
}

function confirmQuickCapture(){

  if(hasSb)hasSb.innerHTML=`<div style="padding:16px 12px;font-size:12px;color:var(--text3);line-height:1.7">${scriptUrl?'Loading from Sheets...':'Paste your Apps Script URL above and click Connect.'}</div>`;
  const pt=document.getElementById('projTitleInput');if(pt)pt.value='';
  const pb=document.getElementById('phaseBar');if(pb)pb.innerHTML='';
  const tl=document.getElementById('taskList');if(tl)tl.innerHTML='<div class="empty">No project selected</div>';
  const nl=document.getElementById('notesList');if(nl)nl.innerHTML='';
}

// SYNC
let _saveVersion=0;      // increments on every local change
let _sheetsVersion=0;    // version we last loaded from Sheets
let _isSaving=false;
let _tabId='tab_'+Date.now()+'_'+Math.random().toString(36).slice(2);

function setSyncBadge(s){
  syncStatus=s;
  const el=document.getElementById('syncBadge');
  if(!el)return;
  el.className='badge '+s;
  el.textContent={ok:'saved',err:'sync error',busy:'syncing…',none:'not connected',conflict:'reloading…'}[s]||s;
  // On error, make badge clickable to show recovery options
  if(s==='err'){
    el.style.cursor='pointer';
    el.title='Click for recovery options';
    el.onclick=showRecoveryOptions;
  } else {
    el.style.cursor='';el.title='';el.onclick=null;
  }
}

function showRecoveryOptions(){
  const bk=(()=>{try{return JSON.parse(localStorage.getItem('ws_local_backup'));}catch(e){return null;}})();
  const bkAge=bk?Math.round((Date.now()-bk.savedAt)/60000):null;
  const div=document.createElement('div');
  div.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center';
  div.innerHTML=`<div style="background:var(--surface);border-radius:var(--radius);padding:24px;width:400px;display:flex;flex-direction:column;gap:10px;box-shadow:0 12px 40px rgba(0,0,0,.3)">
    <div style="font-size:15px;font-weight:700;color:var(--text)">⚠ Sync Error — Recovery Options</div>
    <div style="font-size:12px;color:var(--text3)">Your data is safe locally. Choose a recovery option:</div>
    ${bk?`<button class="btn dark" onclick="restoreLocalBackup();this.closest('[style*=fixed]').remove()" style="justify-content:flex-start;padding:10px 14px">
      <div>
        <div style="font-weight:600">⎌ Restore local backup</div>
        <div style="font-size:11px;opacity:.7">${bkAge} minutes ago — most recent data</div>
      </div>
    </button>`:'<div style="font-size:12px;color:var(--text3)">No local backup available yet</div>'}
    <button class="btn" onclick="pushToSheet();this.closest('[style*=fixed]').remove()" style="justify-content:flex-start;padding:10px 14px">
      <div>
        <div style="font-weight:600">↑ Retry save now</div>
        <div style="font-size:11px;opacity:.7">Try saving current data to Sheets again</div>
      </div>
    </button>
    <button class="btn" onclick="loadFromSheets();this.closest('[style*=fixed]').remove()" style="justify-content:flex-start;padding:10px 14px">
      <div>
        <div style="font-weight:600">↻ Load from Sheets</div>
        <div style="font-size:11px;opacity:.7">Pull latest from Google Sheets</div>
      </div>
    </button>
    <button class="btn sm" onclick="this.closest('[style*=fixed]').remove()" style="align-self:flex-end;color:var(--text3)">Dismiss</button>
  </div>`;
  document.body.appendChild(div);
}

function connectSheet(){
  const url=document.getElementById('urlInput').value.trim();if(!url)return;
  scriptUrl=url;localStorage.setItem('ws_script_url',url);
  setSyncBadge('busy');loadFromSheets();
}

function scheduleSave(){
  if(!scriptUrl)return;
  _saveVersion++;
  clearTimeout(saveTimer);
  setSyncBadge('busy');
  // Always save to localStorage immediately as backup
  try{localStorage.setItem('ws_local_backup',JSON.stringify({
    projects:state.projects,
    meetings:state.meetings||[],
    meetingTypes:state.meetingTypes||[],
    meetingData:state.meetingData||{},
    savedAt:Date.now(),
    version:_saveVersion
  }));}catch(e){}
  // Debounce the actual Sheets save — wait until user pauses for 2.5s
  saveTimer=setTimeout(pushToSheet,2500);
}

function pushToSheet(){
  if(!scriptUrl||_isSaving)return;
  if(!state.projects||state.projects.length===0){setSyncBadge('err');return;}

  // Dedup everything before saving
  state.projects.forEach(p=>{
    p.phases.forEach(ph=>{
      const seenId=new Set(),seenText=new Set();
      p.tasks[ph]=(p.tasks[ph]||[]).filter(t=>{
        if(seenId.has(t.id))return false; seenId.add(t.id);
        const k=(t.text||'').trim().toLowerCase();
        if(seenText.has(k))return false; seenText.add(k);
        const seenSub=new Set();
        t.subtasks=(t.subtasks||[]).filter(s=>{
          const sk=(s.text||'').trim().toLowerCase();
          if(seenSub.has(sk))return false; seenSub.add(sk); return true;
        });
        return true;
      });
      p.notes[ph]=dedupeNotes(p.notes[ph]||[]);
    });
    if(p.archive&&p.archive.length>1){
      const seen=new Set();
      p.archive=p.archive.filter(t=>{
        const k=(t.text||'')+'|'+(t.archivedAt||0);
        if(seen.has(k))return false; seen.add(k); return true;
      });
    }
  });

  _isSaving=true;
  setSyncBadge('busy');
  const ver=_saveVersion;

  const body=JSON.stringify({
    action:'save',
    projects:state.projects,
    meetings:state.meetings||[],
    meetingTypes:state.meetingTypes||[],
    meetingData:state.meetingData||{},
    version:ver,tabId:_tabId,savedAt:Date.now()
  });

  // Use regular fetch (no no-cors) — Apps Script returns JSON we can read
  const controller=typeof AbortController!=='undefined'?new AbortController():null;
  const to=controller?setTimeout(()=>controller.abort(),50000):null;

  fetch(scriptUrl,{
    method:'POST',
    body,
    ...(controller?{signal:controller.signal}:{})
  })
  .then(r=>r.text())
  .then(txt=>{
    if(to)clearTimeout(to);
    _isSaving=false;
    let res={};
    try{res=JSON.parse(txt);}catch(e){res={ok:true};} // if we got a response, treat as ok
    if(res.error&&!res.ok){
      setSyncBadge('err');
      showToast('Save error: '+res.error);
      setTimeout(pushToSheet,10000);
    } else {
      setSyncBadge('ok');
      _sheetsVersion=ver;
      try{localStorage.setItem('ws_last_save',JSON.stringify({tabId:_tabId,version:ver,t:Date.now()}));}catch(e){}
    }
  })
  .catch(err=>{
    if(to)clearTimeout(to);
    _isSaving=false;
    // CORS error from Apps Script is normal — if fetch resolves/rejects we still got through
    // Apps Script doesn't send CORS headers, so treat network errors as "probably saved"
    if(err.name==='AbortError'){
      setSyncBadge('err');
      showToast('Save timed out — retrying in 15s');
      setTimeout(pushToSheet,15000);
    } else {
      // TypeError: Failed to fetch = CORS block — but the POST was likely received
      // Mark as ok and rely on next load to verify
      setSyncBadge('ok');
      _sheetsVersion=ver;
      try{localStorage.setItem('ws_last_save',JSON.stringify({tabId:_tabId,version:ver,t:Date.now()}));}catch(e){}
    }
  });
}

function dedupePhase(tasks){
  const seenId=new Set(),seenText=new Set();
  return (tasks||[]).filter(t=>{
    if(seenId.has(t.id))return false; seenId.add(t.id);
    const k=(t.text||'').trim().toLowerCase().replace(/\s+/g,' ');
    if(seenText.has(k))return false; seenText.add(k);
    // Also dedup subtasks
    const seenSub=new Set();
    t.subtasks=(t.subtasks||[]).filter(s=>{
      const sk=(s.text||'').trim().toLowerCase();
      if(seenSub.has(sk))return false; seenSub.add(sk); return true;
    });
    return true;
  });
}
function dedupeNotes(notes){
  const seen=new Set();
  return notes.filter(n=>{
    const key=(n.text||'').trim().toLowerCase().replace(/\s+/g,' ');
    if(seen.has(key))return false;
    seen.add(key);return true;
  });
}

function normalizeProjects(projects){
  return projects.map(p=>{
    if(!p.activePhase)p.activePhase=0;
    if(!p.phaseColors)p.phaseColors={};
    if(!p.status)p.status='active';
    if(!p.archive)p.archive=[];

    // Restore phase order from saved sequence if provided
    if(p.phaseOrder&&p.phaseOrder.length){
      const ordered=[];
      p.phaseOrder.forEach(ph=>{if(p.phases.includes(ph))ordered.push(ph);});
      p.phases.forEach(ph=>{if(!ordered.includes(ph))ordered.push(ph);});
      p.phases=ordered;
    }

    p.phases.forEach((ph,i)=>{
      if(!p.phaseColors[ph])p.phaseColors[ph]=PHASE_COLORS[i%PHASE_COLORS.length];
      if(!p.tasks[ph])p.tasks[ph]=[];
      if(!p.notes[ph])p.notes[ph]=[];
      p.notes[ph]=p.notes[ph].map(n=>typeof n==='string'?{id:'n'+Math.random(),text:n,type:'note'}:n);
      p.tasks[ph]=dedupePhase(p.tasks[ph]);
      p.notes[ph]=dedupeNotes(p.notes[ph]);
      p.tasks[ph].forEach(t=>{
        if(!t.subtasks)t.subtasks=[];
        if(!t.note)t.note='';
        if(!t.type)t.type='task';
        if(t.highlighted===undefined)t.highlighted=false;
        if(!t.files)t.files=[];
        if(!t.badge)t.badge='none';
        if(t.subsCollapsed===undefined)t.subsCollapsed=false;
        if(!t.due)t.due='none';
        if(!t.doneAt)t.doneAt=0;
        // Dedup subtasks on load
        if(t.subtasks&&t.subtasks.length>1){
          const seenSub=new Set();
          t.subtasks=t.subtasks.filter(s=>{
            const k=(s.text||'').trim().toLowerCase();
            if(seenSub.has(k))return false;seenSub.add(k);return true;
          });
        }
        const seenS=new Set();
        t.subtasks=t.subtasks.filter(s=>{
          const k=s.text.trim().toLowerCase().replace(/\s+/g,' ');
          if(seenS.has(k))return false;seenS.add(k);return true;
        });
      });
    });
    return p;
  });
}

function loadFromSheets(silent){
  if(!scriptUrl){setSyncBadge('none');renderEmpty();return;}
  // Don't reload if a save is currently in progress — it would overwrite unsaved state
  if(_isSaving){
    setTimeout(()=>loadFromSheets(silent),1500);
    return;
  }
  if(!silent)setSyncBadge('busy');
  if(!state.projects.length&&!silent)showLoading('Loading your workspace...');
  const cb='load_'+Date.now()+'_'+Math.random().toString(36).slice(2);
  const timeout=setTimeout(()=>{
    hideLoading();setSyncBadge('err');
    if(!silent)showToast('Could not reach Sheets — check your Apps Script URL');
    delete window[cb];
    if(!state.projects.length)renderEmpty();
  },15000);
  window[cb]=function(data){
    clearTimeout(timeout);hideLoading();
    if(data&&data.projects&&data.projects.length){
      const loaded=normalizeProjects(data.projects);
      const ordered=applyProjectOrder(loaded);
      // If user has unsaved local changes, protect them by merging
      if(_saveVersion>_sheetsVersion&&state.projects.length>0){
        ordered.forEach(sheetProj=>{
          const local=state.projects.find(p=>p.id===sheetProj.id);
          if(local){
            sheetProj.tasks=local.tasks;
            sheetProj.notes=local.notes;
            sheetProj.archive=local.archive||sheetProj.archive||[];
          }
        });
      }
      state.projects=ordered;
      if(data.meetings)state.meetings=data.meetings;
      if(!state.meetings)state.meetings=[];
      if(data.meetingTypes)state.meetingTypes=data.meetingTypes;
      if(data.meetingData)state.meetingData=data.meetingData;
      if(!state.meetingData)state.meetingData={};
      restorePosition();
      const stillExists=state.projects.find(p=>p.id===state.activeProject);
      if(!stillExists)state.activeProject=state.projects[0].id;
      _sheetsVersion=_saveVersion;
      setSyncBadge('ok');
      render();
    } else {
      setSyncBadge('ok');
      if(!state.projects.length){renderEmpty();if(!silent)showToast('Connected — add your first project below');}
      else render();
    }
    delete window[cb];
  };
  const s=document.createElement('script');
  s.src=scriptUrl+'?action=load&callback='+cb+'&t='+Date.now();
  s.onerror=()=>{
    clearTimeout(timeout);hideLoading();setSyncBadge('err');
    if(!silent)showToast('Could not load — check your Apps Script URL');
    delete window[cb];
    if(!state.projects.length)renderEmpty();
  };
  document.head.appendChild(s);
}

// DEDUPLICATE — removes duplicate tasks based on text+phase match
function deduplicateAll(){
  let totalRemoved=0;
  state.projects.forEach(p=>{
    p.phases.forEach(ph=>{
      const before=(p.tasks[ph]||[]).length+(p.notes[ph]||[]).length;
      p.tasks[ph]=dedupePhase(p.tasks[ph]||[]);
      p.notes[ph]=dedupeNotes(p.notes[ph]||[]);
      const after=p.tasks[ph].length+p.notes[ph].length;
      totalRemoved+=before-after;
    });
  });
  if(totalRemoved>0){render();scheduleSave();showToast(`Removed ${totalRemoved} duplicate${totalRemoved>1?'s':''}`);}
  else showToast('No duplicates found');
}

function showSyncMenu(e){
  e.preventDefault();e.stopPropagation();
  const bk=(()=>{try{return JSON.parse(localStorage.getItem('ws_local_backup'));}catch(e){return null;}})();
  const bkAge=bk?Math.round((Date.now()-bk.savedAt)/60000):null;
  const items=[
    {label:'↺ Load from Sheets',fn:'function(){loadFromSheets(false)}'},
    {label:'💾 Save to Sheets now',fn:'function(){pushToSheet()}'},
    'sep',
    {label:'🧹 Clean duplicates + save',fn:'function(){deduplicateAll();setTimeout(pushToSheet,500)}'},
  ];
  if(bk)items.push({label:'⎌ Restore local backup ('+bkAge+'m ago)',fn:'function(){restoreLocalBackup()}'});
  const rect=e.target.getBoundingClientRect();
  showCtx(rect.left,rect.bottom+4,items);
}
function restoreLocalBackup(){
  try{
    const bk=JSON.parse(localStorage.getItem('ws_local_backup'));
    if(!bk||!bk.projects){showToast('No local backup found');return;}
    state.projects=normalizeProjects(bk.projects);
    if(bk.meetingTypes)state.meetingTypes=bk.meetingTypes;
    if(bk.meetingData)state.meetingData=bk.meetingData;
    restorePosition();render();
    const age=Math.round((Date.now()-bk.savedAt)/60000);
    showToast('✓ Restored from local backup ('+age+'m ago) — save to Sheets to sync');
    setTimeout(pushToSheet,1000);
  }catch(e){showToast('Could not restore: '+e.message);}
}
window.addEventListener('storage',e=>{
  if(e.key==='ws_last_save'&&scriptUrl){
    try{
      const info=JSON.parse(e.newValue);
      if(info.tabId!==_tabId){
        // Another tab saved — only reload if user has been idle for 10+ seconds
        const recentActivity=Date.now()-_lastActivity<10000;
        if(!recentActivity){
          setSyncBadge('conflict');
          clearTimeout(saveTimer);
          setTimeout(()=>loadFromSheets(true),2000);
        }
        // If user is active, their next scheduleSave will handle it
      }
    }catch(ex){}
  }
});

// Track last user activity
let _lastActivity=Date.now();
document.addEventListener('mousemove',()=>_lastActivity=Date.now(),{passive:true});
document.addEventListener('keydown',()=>_lastActivity=Date.now(),{passive:true});
document.addEventListener('touchstart',()=>_lastActivity=Date.now(),{passive:true});

// Page visibility — save on hide, reload on show only if truly idle
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='hidden'&&scriptUrl&&state.projects.length){
    clearTimeout(saveTimer);
    if(_saveVersion>_sheetsVersion){
      const data=JSON.stringify({action:'save',projects:state.projects,tabId:_tabId,savedAt:Date.now()});
      navigator.sendBeacon?navigator.sendBeacon(scriptUrl,data):fetch(scriptUrl,{method:'POST',mode:'no-cors',body:data}).catch(()=>{});
      try{localStorage.setItem('ws_last_save',JSON.stringify({tabId:_tabId,version:_saveVersion,t:Date.now()}));}catch(e){}
      _sheetsVersion=_saveVersion;
    }
    window._hiddenAt=Date.now();
  }
  if(document.visibilityState==='visible'&&scriptUrl){
    const hiddenFor=Date.now()-(window._hiddenAt||Date.now());
    const recentActivity=Date.now()-_lastActivity<10000;
    // Only reload if hidden 5+ minutes AND no unsaved changes AND no recent activity
    // Increased from 2min to 5min to prevent data loss during normal workflow
    if(hiddenFor>300000&&!recentActivity&&_saveVersion<=_sheetsVersion){
      loadFromSheets(false);
    }
    window._hiddenAt=null;
  }
});
window._lastVisible=Date.now();

// STARTUP — load from Sheets only on fresh page open
// Do NOT reload if state already has projects (e.g. hot reload during development)
render();
if(scriptUrl){
  setSyncBadge('busy');
  // Small delay so page renders first, then loads
  setTimeout(()=>loadFromSheets(),300);
} else {
  setSyncBadge('none');
  renderEmpty();
}</script>
