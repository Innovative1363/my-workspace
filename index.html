<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>My Project Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0efe9;--surface:#fff;--surface2:#eae8e1;--surface3:#e0ddd5;
  --border:rgba(0,0,0,0.10);--border-md:rgba(0,0,0,0.18);--border-strong:rgba(0,0,0,0.30);
  --text:#111008;--text2:#4a4840;--text3:#8a8780;--accent:#1c1b18;
  --radius:10px;--radius-sm:6px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --hl-bg:#fffae0;--hl-border:#e8d84a;--q-bg:#eef2ff;--q-border:#818cf8;--q-text:#3730a3;
}
body.dark{
  --bg:#0f0f0d;--surface:#1a1a17;--surface2:#252520;--surface3:#2e2e28;
  --border:rgba(255,255,255,0.08);--border-md:rgba(255,255,255,0.14);--border-strong:rgba(255,255,255,0.26);
  --text:#f0ede6;--text2:#b8b5ae;--text3:#6b6860;--accent:#f0ede6;
  --hl-bg:#2a2500;--hl-border:#a8940a;--q-bg:#1a1f3a;--q-border:#4f5daa;--q-text:#818cf8;
}
/* Dark mode: all white/light backgrounds become surfaces */
body.dark .task-card{background:var(--surface);border-color:var(--border-md)}
body.dark .task-card.highlighted{background:var(--hl-bg)}
body.dark .task-card.question-card{background:var(--q-bg)}
body.dark .task-detail{background:var(--surface2)}
body.dark .import-area{background:var(--surface)}
body.dark .import-ta{background:var(--surface2)}
body.dark .add-inp{background:var(--surface);color:var(--text)}
body.dark .cal-task-card{background:var(--surface);border-color:var(--border-md)}
body.dark .cal-sub-inp{background:var(--surface2);color:var(--text);border-color:var(--border-md)}
/* Dark mode calendar squares — today needs lighter accent so text is readable */
body.dark #weekGrid>div[style*="background:var(--accent)"]{background:#3a3a35 !important}
/* Cal task cards in dark mode */
body.dark .cal-task-card{background:var(--surface);border-color:var(--border-md)}
body.dark .cal-task-card:hover{border-color:var(--border-strong)}
body.dark .cal-task-text{color:var(--text)}
body.dark .cal-proj-label{color:var(--text3)}
body.dark .cal-subtasks{border-top-color:var(--border)}
/* Today section header in dark mode */
body.dark #calTodaySection [style*="color:#dc2626"]{color:#f87171 !important}
body.dark #calTodaySection [style*="border-bottom:3px solid #fca5a5"]{border-bottom-color:#7f1d1d !important}
body.dark .act-add{background:var(--surface2);border-top-color:var(--border-md)}
body.dark .act-add-ta{background:var(--surface3);color:var(--text);border-color:var(--border-md)}
body.dark .act-add-date{background:var(--surface3);color:var(--text);border-color:var(--border-md)}
body.dark .act-row{border-bottom-color:var(--border)}
body.dark .mtg-task-row{background:var(--surface2);border-color:var(--border-md)}
body.dark .mtg-ta{background:var(--surface2);color:var(--text);border-color:var(--border-md)}
body.dark .notes-panel{background:var(--surface)}
body.dark .archive-view{background:var(--bg)}
body.dark select{background:var(--surface2);color:var(--text);border-color:var(--border-md)}
body.dark input[type="date"]{background:var(--surface2);color:var(--text);border-color:var(--border-md)}
body.dark input[type="text"],body.dark input:not([type]){background:var(--surface2);color:var(--text)}
body.dark textarea{background:var(--surface2);color:var(--text)}
body.dark .quick-capture-modal{background:var(--surface)}
body.dark .sync-url{background:var(--surface2);color:var(--text2)}
/* Dark mode badge adjustments */
body.dark .task-badge.badge-work{background:#3d1f00;color:#f5a05a;border-color:#7a3810}
body.dark .task-badge.badge-look{background:#1a2040;color:#818cf8;border-color:#3a4baa}
body.dark .task-badge.badge-ask{background:#0d2a1a;color:#4ade80;border-color:#1a6b38}
body.dark .due-today{background:#3d0a0a;color:#f87171;border-color:#7a1010}
body.dark .due-week{background:#2a1f00;color:#fbbf24;border-color:#7a5500}
body.dark .due-someday{background:#1a1a2a;color:#94a3b8;border-color:#334155}
body.dark .badge.ok{background:#0d2a1a;color:#4ade80}
body.dark .badge.err{background:#3d0a0a;color:#f87171}
body.dark .badge.busy{background:#2a1f00;color:#fbbf24}
body.dark .btn{background:var(--surface2);border-color:var(--border-md);color:var(--text2)}
body.dark .btn:hover{background:var(--surface3)}
body.dark .btn.dark{background:var(--text);color:var(--bg)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column}
/* TOPBAR */
.topbar{display:flex;align-items:center;gap:10px;padding:8px 18px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;height:48px}
.logo{font-size:13px;font-weight:500;letter-spacing:.02em;white-space:nowrap}
.logo em{color:var(--text3);font-style:normal;font-weight:400}
.spacer{flex:1}
.sync-url{font-family:var(--mono);font-size:11px;padding:5px 10px;border-radius:var(--radius-sm);border:1px solid var(--border-md);background:var(--bg);color:var(--text2);width:280px;outline:none}
.sync-url::placeholder{color:var(--text3)}
.sync-url:focus{border-color:var(--border-strong)}
.btn{padding:5px 11px;border-radius:var(--radius-sm);font-size:12px;font-family:var(--font);border:1px solid var(--border-md);background:var(--surface);color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;transition:all .12s;line-height:1}
.btn:hover{background:var(--surface2);border-color:var(--border-strong);color:var(--text)}
.btn.dark{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.dark:hover{background:#333}
.btn.sm{padding:3px 8px;font-size:11px}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;font-family:var(--mono);white-space:nowrap;font-weight:500}
.badge.ok{background:#e4f2e8;color:#1a6b38}
.badge.err{background:#fde8e8;color:#9b2020}
.badge.busy{background:#fef8e0;color:#7a5c00}
.badge.none{background:var(--surface2);color:var(--text3)}
/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden}
/* SIDEBAR */
.sidebar{width:210px;min-width:210px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:14px 14px 6px;font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text2)}
.proj-list{flex:1;overflow-y:auto;padding:2px 8px}
.proj-item{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;color:var(--text2);margin-bottom:2px;transition:background .1s;user-select:none}
.proj-item:hover{background:var(--surface2)}
.proj-item.active{background:var(--surface2);color:var(--text);font-weight:500}
.proj-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.proj-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-foot{padding:10px;border-top:1px solid var(--border)}
.np-form{padding:10px;border-top:1px solid var(--border)}
.np-input{width:100%;font-size:13px;padding:7px 10px;border-radius:var(--radius-sm);border:1px solid var(--border-md);background:var(--bg);color:var(--text);font-family:var(--font);outline:none;margin-bottom:8px}
.np-input:focus{border-color:var(--border-strong)}
.color-dots{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px}
.cdot{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .1s}
.cdot.sel{border-color:var(--text)}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.proj-header{display:flex;align-items:center;gap:10px;padding:11px 22px 9px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.proj-title{font-size:20px;font-weight:600;font-family:var(--font);color:var(--text);border:none;background:none;outline:none;flex:1}
.proj-title::placeholder{color:var(--text3)}
/* PHASE BAR */
.phase-bar{display:flex;gap:6px;padding:10px 22px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;align-items:center}
.phase-chip{padding:5px 15px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid transparent;white-space:nowrap;transition:all .1s;font-family:var(--font);user-select:none;color:#fff;font-weight:600;opacity:.75}
.phase-chip:hover{opacity:1}
.phase-chip.active{opacity:1;box-shadow:0 0 0 2px rgba(0,0,0,0.22)}
.phase-chip.done{text-decoration:line-through;opacity:.35}
.phase-chip.highlights-chip{background:linear-gradient(135deg,#c9a800,#e8d84a)!important;color:#5a4500!important;opacity:1}
.new-phase-inp{font-size:12px;padding:4px 12px;border-radius:20px;border:1px dashed var(--border-strong);background:none;color:var(--text3);font-family:var(--font);outline:none;width:80px;transition:all .1s}
.new-phase-inp:focus{width:120px;border-color:var(--text3);color:var(--text2)}
/* CONTENT */
.content{flex:1;display:flex;overflow:hidden}
/* TASKS PANEL */
.tasks-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:14px 20px 14px;gap:10px}
.panel-row{display:flex;align-items:center;gap:8px;flex-shrink:0}
.panel-label{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text2);flex:1}
.add-row{display:flex;gap:8px;flex-shrink:0}
.add-inp{flex:1;font-size:15px;padding:10px 14px;border-radius:var(--radius);border:1px solid var(--border-md);background:var(--surface);color:var(--text);font-family:var(--font);outline:none;transition:border-color .12s}
.add-inp:focus{border-color:var(--border-strong)}
.add-inp::placeholder{color:var(--text3)}
.type-toggle{display:flex;border:1px solid var(--border-md);border-radius:var(--radius-sm);overflow:hidden;flex-shrink:0}
.type-btn{padding:8px 12px;font-size:12px;font-family:var(--font);border:none;background:var(--surface);color:var(--text2);cursor:pointer;transition:all .1s;border-right:1px solid var(--border-md)}
.type-btn:last-child{border-right:none}
.type-btn.active-task{background:#1c1b18;color:#fff}
.type-btn.active-question{background:var(--q-bg);color:var(--q-text);font-weight:500}
/* IMPORT BANNER */
.import-area{background:var(--surface);border:1px solid var(--border-md);border-radius:var(--radius);padding:12px 14px;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.import-ta{width:100%;font-size:12px;padding:7px 10px;border-radius:var(--radius-sm);border:1px solid var(--border-md);background:var(--bg);color:var(--text);font-family:var(--mono);outline:none;resize:none;line-height:1.5;min-height:70px}
.import-ta:focus{border-color:var(--border-strong)}
.import-row{display:flex;align-items:center;gap:8px}
.import-hint{font-size:11px;color:var(--text3);flex:1}
/* TASK LIST — KEY FIX: flex:1 + overflow-y:auto */
.task-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;padding-right:4px;min-height:0}
.task-list::-webkit-scrollbar{width:4px}
.task-list::-webkit-scrollbar-track{background:transparent}
.task-list::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:4px}
/* HIGHLIGHTS SECTION */
.highlights-section{border-bottom:1px solid var(--hl-border);margin-bottom:6px;padding-bottom:8px;flex-shrink:0}
.highlights-header{font-size:10px;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:#9a8a10;margin-bottom:6px}
/* TASK CARD */
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .12s;cursor:pointer;flex-shrink:0}
.task-card:hover{border-color:var(--border-md)}
.task-card.highlighted{background:var(--hl-bg);border-color:var(--hl-border)}
.task-card.question-card{background:var(--q-bg);border-color:var(--q-border);margin-left:18px}
.task-card.dragging{opacity:.4;border-style:dashed}
.task-card.drag-over{border-top:2px solid var(--accent)}
.task-row{display:flex;align-items:center;gap:8px;padding:10px 12px;min-height:42px;pointer-events:none}
.task-row>*{pointer-events:auto}
.drag-handle{color:var(--text3);cursor:grab;font-size:14px;flex-shrink:0;opacity:0;transition:opacity .1s;user-select:none;padding:0 2px}
.task-card:hover .drag-handle{opacity:1}
.drag-handle:active{cursor:grabbing}
.task-cb{cursor:pointer;flex-shrink:0;accent-color:var(--accent);width:15px;height:15px}
.q-badge{font-size:10px;font-weight:500;background:var(--q-border);color:var(--q-text);border-radius:4px;padding:1px 5px;flex-shrink:0}
.task-text-wrap{flex:1;min-width:0}
.task-text{font-size:14.5px;color:var(--text);line-height:1.4;word-break:break-word}
.task-text.done{text-decoration:line-through;color:var(--text3)}
.task-text.question-text{color:var(--q-text)}
.task-edit-inp{font-size:14.5px;font-family:var(--font);color:var(--text);border:none;background:none;outline:none;width:100%;line-height:1.4}
.task-meta{font-size:11px;color:var(--text3);margin-top:2px;display:flex;gap:8px;align-items:center}
.file-chip{font-size:10px;background:var(--surface2);border:1px solid var(--border-md);border-radius:4px;padding:1px 6px;color:var(--text2);display:inline-flex;align-items:center;gap:3px;text-decoration:none;cursor:pointer;word-break:break-all;white-space:normal}
.file-chip:hover{background:var(--surface3);border-color:var(--border-strong)}
.file-img-preview{display:block;max-width:100%;max-height:180px;border-radius:var(--radius-sm);border:1px solid var(--border-md);margin-top:4px;cursor:pointer;object-fit:contain;background:var(--surface2)}
.file-img-wrap{position:relative;display:inline-block;margin-top:4px}
.file-img-name{font-size:10px;color:var(--text3);margin-top:2px}
.task-actions{display:flex;align-items:center;gap:2px;flex-shrink:0;opacity:0;transition:opacity .1s}
.task-card:hover .task-actions{opacity:1}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:3px 4px;border-radius:4px;font-family:var(--font);transition:all .1s;line-height:1}
.icon-btn:hover{background:var(--surface2);color:var(--text2)}
.icon-btn.star-active{color:#c9a800}
/* TASK DETAIL */
.task-detail{border-top:1px solid var(--border);padding:10px 12px 12px;background:var(--bg);display:flex;flex-direction:column;gap:10px}
.task-card.question-card .task-detail{background:#e8eeff}
.task-card.highlighted .task-detail{background:#fffbe8}
.detail-label{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.subtask-list{display:flex;flex-direction:column;gap:2px}
.subtask-row{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:var(--radius-sm)}
.subtask-row:hover{background:var(--surface)}
.s-cb{cursor:pointer;accent-color:var(--accent);flex-shrink:0}
.s-text{flex:1;font-size:13px;color:var(--text2);line-height:1.4}
.s-text.done{text-decoration:line-through;color:var(--text3)}
.s-edit-inp{font-size:13px;font-family:var(--font);color:var(--text2);border:none;background:none;outline:none;width:100%}
.s-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;opacity:0;padding:0 2px;font-family:var(--font)}
.subtask-row:hover .s-del{opacity:1}
.add-sub-row{display:flex;gap:6px}
.add-sub-inp{flex:1;font-size:12px;padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border-md);background:var(--surface);color:var(--text);font-family:var(--font);outline:none}
.add-sub-inp:focus{border-color:var(--border-strong)}
.task-note-area{width:100%;font-size:13px;padding:8px 10px;border-radius:var(--radius-sm);border:1px solid var(--border-md);background:var(--surface);color:var(--text);font-family:var(--font);outline:none;resize:none;line-height:1.6;min-height:68px}
.task-note-area:focus{border-color:var(--border-strong)}
/* TASK BADGES */
.task-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;cursor:pointer;flex-shrink:0;letter-spacing:.04em;text-transform:uppercase;border:1px solid transparent;transition:all .1s}
.task-badge.badge-work{background:#fff0e0;color:#b85c00;border-color:#f5c48a}
.task-badge.badge-look{background:#f0f4ff;color:#3a4bbf;border-color:#b0bfff}
.task-badge.badge-ask{background:#f0fff4;color:#1a6b38;border-color:#8adbb0}
.task-badge.badge-none{background:var(--surface2);color:var(--text3);border-color:var(--border-md);opacity:.5}
/* INLINE SUBTASKS */
.subtask-tally{display:flex;flex-direction:column;gap:2px;padding:4px 12px 6px 25%;border-top:1px solid var(--border)}
.subtask-tally-row{display:flex;align-items:center;gap:7px;padding:3px 0;font-size:12.5px;color:var(--text2)}
.subtask-tally-row.done-sub .st-text{text-decoration:line-through;color:var(--text3)}
.st-cb{cursor:pointer;accent-color:var(--accent);flex-shrink:0;width:13px;height:13px}
.st-text{flex:1;line-height:1.3}
.st-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;opacity:0;padding:0 2px;font-family:var(--font)}
.subtask-tally-row:hover .st-del{opacity:1}
.add-sub-inline{display:flex;gap:6px;padding:4px 12px 8px 25%}
.add-sub-inline input{flex:1;font-size:12px;padding:5px 8px;border-radius:var(--radius-sm);border:1px solid var(--border-md);background:var(--surface);color:var(--text);font-family:var(--font);outline:none}
.add-sub-inline input:focus{border-color:var(--border-strong)}
.file-drop-zone{border:1px dashed var(--border-md);border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;color:var(--text3);text-align:center;transition:all .15s;cursor:pointer}
.file-drop-zone.drag-active{border-color:var(--accent);background:var(--surface2);color:var(--text2)}
.file-drop-zone input[type=file]{display:none}
.file-list{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
/* RIGHT PANEL */
.notes-panel{width:280px;min-width:280px;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--surface)}
.np-head{padding:12px 16px 10px;display:flex;align-items:center;gap:8px;flex-shrink:0;border-bottom:1px solid var(--border)}
.np-tabs{display:flex;gap:0;flex-shrink:0}
.np-tab{font-size:11px;padding:4px 10px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text3);border:1px solid transparent;font-family:var(--font);transition:all .1s}
.np-tab.active{background:var(--surface2);color:var(--text2);border-color:var(--border-md)}
.np-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-height:0}
.quick-area{padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.q-textarea{font-size:13px;padding:8px 11px;border-radius:var(--radius-sm);border:1px solid var(--border-md);background:var(--bg);color:var(--text);font-family:var(--font);outline:none;resize:none;line-height:1.6;width:100%;min-height:75px}
.q-textarea:focus{border-color:var(--border-strong)}
.items-list{flex:1;overflow-y:auto;padding:10px 16px;display:flex;flex-direction:column;gap:6px;min-height:0}
.note-card{border-radius:var(--radius-sm);padding:9px 11px;font-size:12.5px;line-height:1.55;position:relative;cursor:pointer;transition:border-color .1s}
.note-card.type-note{background:var(--bg);border:1px solid var(--border);color:var(--text2)}
.note-card.type-note:hover{border-color:var(--border-md)}
.note-card.type-question{background:var(--q-bg);border:1px solid var(--q-border);color:var(--q-text)}
.note-card-del{position:absolute;top:5px;right:5px;background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;opacity:0;line-height:1;padding:0;font-family:var(--font)}
.note-card:hover .note-card-del{opacity:1}
.note-type-label{font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;opacity:.7}
.empty{font-size:12px;color:var(--text3);text-align:center;padding:24px 0}
.row{display:flex;gap:6px;align-items:center}
/* CONTEXT MENU */
.ctx-menu{position:fixed;background:var(--surface);border:1px solid var(--border-md);border-radius:var(--radius-sm);box-shadow:0 6px 20px rgba(0,0,0,.12);z-index:200;min-width:190px;padding:4px 0;font-size:13px}
.ctx-item{padding:8px 14px;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:8px;transition:background .08s}
.ctx-item:hover{background:var(--surface2);color:var(--text)}
.ctx-item.danger{color:#b33}
.ctx-item.danger:hover{background:#fde8e8}
.ctx-sep{height:1px;background:var(--border);margin:3px 0}
/* PHASE COLOR PICKER */
.phase-color-picker{display:flex;gap:5px;padding:6px 10px;background:var(--surface);border:1px solid var(--border-md);border-radius:var(--radius-sm);position:fixed;z-index:201;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.pcp-dot{width:14px;height:14px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.pcp-dot:hover{border-color:var(--text3)}
.pcp-dot.sel{border-color:var(--text)}
/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--accent);color:#fff;font-size:12px;padding:7px 14px;border-radius:var(--radius-sm);opacity:0;transition:opacity .2s;pointer-events:none;z-index:300;font-family:var(--font)}
.toast.show{opacity:1}
/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:400;display:flex;align-items:center;justify-content:center}
.modal{background:var(--surface);border-radius:var(--radius);padding:24px;width:380px;display:flex;flex-direction:column;gap:14px;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.modal h3{font-size:15px;font-weight:500}
.modal p{font-size:13px;color:var(--text2);line-height:1.5}
.modal input{width:100%;font-size:13px;padding:8px 10px;border-radius:var(--radius-sm);border:1px solid var(--border-md);background:var(--bg);color:var(--text);font-family:var(--font);outline:none}
.modal input:focus{border-color:var(--border-strong)}
.upload-progress{font-size:12px;color:var(--text3);font-family:var(--mono)}

/* =====================
   MOBILE RESPONSIVE
   Only applies ≤ 768px
   Desktop unchanged
   ===================== */
@media(max-width:768px){
  html,body{height:100%;overflow:hidden;position:fixed;width:100%}

  /* topbar — hide sync url, show hamburger */
  .topbar{padding:8px 14px;height:48px;gap:8px}
  .sync-url{display:none}
  .topbar .btn:not(.mob-always){display:none}
  .badge{display:none}
  .mob-menu-btn{display:flex!important}

  /* sidebar becomes a slide-out drawer */
  .sidebar{
    position:fixed;top:0;left:0;bottom:0;z-index:350;
    width:82vw;max-width:300px;
    transform:translateX(-100%);
    transition:transform .25s ease;
    box-shadow:4px 0 24px rgba(0,0,0,.15);
  }
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);
    z-index:340;
  }
  .sidebar-overlay.show{display:block}

  /* layout — main takes full width */
  .layout{flex-direction:column}
  .main{width:100%;flex:1;overflow:hidden}

  /* project header */
  .proj-header{padding:10px 14px 8px;gap:8px}
  .proj-title{font-size:15px}
  .proj-header .btn.sm{font-size:11px;padding:5px 8px}

  /* phase bar */
  .phase-bar{padding:8px 14px;gap:5px}

  /* content — stack vertically, tabs to switch */
  .content{flex-direction:column;overflow:hidden;flex:1}
  .tasks-panel{padding:12px 14px;gap:8px;overflow:hidden;display:none}
  .tasks-panel.mob-active{display:flex}
  .notes-panel{width:100%;min-width:0;border-left:none;border-top:1px solid var(--border);display:none;max-height:50vh}
  .notes-panel.mob-active{display:flex}

  /* show tab bar on mobile */
  .mob-tab-bar{display:flex!important}

  /* bump content above bottom bar */
  .layout{padding-bottom:56px}

  /* task list larger touch targets */
  .task-row{padding:12px 12px;min-height:48px}
  .task-cb{width:18px;height:18px}
  .task-actions{opacity:1!important}
  .icon-btn{padding:5px 6px;font-size:14px}
  .drag-handle{opacity:.4!important}

  /* subtask rows */
  .subtask-row{padding:8px 6px}
  .s-cb{width:16px;height:16px}
  .s-del{opacity:1!important}

  /* add row — stack on small screens */
  .add-row{flex-wrap:wrap;gap:6px}
  .add-inp{font-size:16px;min-width:0} /* 16px prevents iOS zoom */
  .type-toggle{width:100%;order:2}
  .type-btn{flex:1;padding:10px}
  .add-row .btn.dark{order:3;width:100%;justify-content:center;padding:10px}

  /* import area */
  .import-ta{font-size:14px;min-height:100px}

  /* notes panel mobile */
  .quick-area{padding:10px 14px}
  .q-textarea{font-size:16px;min-height:80px}
  .items-list{padding:8px 14px}

  /* task detail */
  .task-detail{padding:10px 12px 16px}
  .add-sub-inp{font-size:16px;padding:9px 10px}
  .task-note-area{font-size:16px}

  /* phase chips larger */
  .phase-chip{padding:6px 14px;font-size:12px}

  /* proj items larger */
  .proj-item{padding:11px 10px;font-size:14px}
  .sb-foot{padding:14px 10px}

  /* modals full-width on mobile */
  #exportPanel>div, #confirmModal>div{width:92vw!important;max-width:none!important}
}

/* elements hidden on desktop, shown on mobile */
.mob-menu-btn{display:none}
.mob-tab-bar{display:none}
.sidebar-overlay{display:none}
/* QUICK CAPTURE */
.quick-capture-btn{position:fixed;bottom:24px;right:24px;width:48px;height:48px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.25);z-index:100;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.quick-capture-btn:hover{transform:scale(1.1)}
/* DUE DATE */
.due-badge{font-size:10px;font-weight:500;padding:2px 6px;border-radius:4px;flex-shrink:0;cursor:pointer;border:1px solid transparent;white-space:nowrap}
.due-today{background:#fde8e8;color:#9b2020;border-color:#f5aaaa}
.due-week{background:#fff8e0;color:#7a5c00;border-color:#f5d87a}
.due-someday{background:var(--surface2);color:var(--text3);border-color:var(--border)}
/* MAIN TABS */
.main-tabs{display:flex;gap:0;padding:0 22px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.main-tab{padding:8px 14px;font-size:12px;font-family:var(--font);color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .1s;white-space:nowrap}
.main-tab:hover{color:var(--text2)}
.main-tab.active{color:var(--text);border-bottom-color:var(--accent);font-weight:500}
/* 2-WEEK GRID */
.week-grid{display:grid;grid-template-columns:repeat(14,1fr);gap:3px}
.week-day{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 2px;border-radius:var(--radius-sm);cursor:default}
.week-day.today .wd-num{background:var(--accent);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.wd-name{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.wd-num{font-size:12px;font-weight:500;color:var(--text2);width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.wd-dot{width:4px;height:4px;border-radius:50%;background:var(--q-text);flex-shrink:0}
.week-day.no-tasks .wd-dot{opacity:0}
.week-day.has-tasks .wd-dot{opacity:1}
.cal-task-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:4px;overflow:hidden}
.cal-task-card:hover{border-color:var(--border-md)}
.cal-task-main{display:flex;align-items:center;gap:7px;padding:8px 10px}
.cal-cb{cursor:pointer;accent-color:var(--accent);flex-shrink:0;width:14px;height:14px}
.cal-sub-cb{cursor:pointer;accent-color:var(--accent);flex-shrink:0;width:12px;height:12px}
.cal-task-text{flex:1;font-size:12.5px;color:var(--text);cursor:pointer;line-height:1.3}
.cal-task-text:hover{text-decoration:underline;color:var(--q-text)}
.cal-task-text.done{text-decoration:line-through;color:var(--text3)}
.cal-proj-label{font-size:10px;color:var(--text3);white-space:nowrap;flex-shrink:0}
.cal-subtasks{padding:2px 10px 6px 46px;display:flex;flex-direction:column;gap:2px;border-top:1px solid var(--border)}
.cal-sub-row{display:flex;align-items:center;gap:6px;padding:2px 0}
.cal-add-sub{padding:3px 0 2px}
.cal-sub-inp{width:100%;font-size:11px;padding:3px 6px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:var(--font);outline:none}
.cal-sub-inp:focus{border-color:var(--border-md)}
.cal-section{display:flex;flex-direction:column;gap:4px}
.cal-section-head{font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px}
.cal-section-body{display:flex;flex-direction:column}
/* SUBTASK INDENT FIX — handled in main CSS above */
/* MEETINGS */
.mtg-layout{display:flex;flex:1;overflow:hidden}
.mtg-list{width:220px;min-width:220px;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--surface)}
.mtg-list-head{padding:12px 12px 8px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);flex-shrink:0}
.mtg-list-sect{padding:4px 8px 2px;font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text2)}
.mtg-list-items{flex:1;overflow-y:auto;padding:2px 8px 8px}
.mtg-item{display:flex;align-items:center;gap:8px;padding:9px 9px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:2px;border-left:3px solid transparent;transition:background .1s}
.mtg-item:hover{background:var(--surface2)}
.mtg-item.active{border-left-color:var(--accent);background:var(--surface2)}
.mtg-item-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.mtg-item-name{flex:1;font-size:14px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mtg-item-date{font-size:10px;color:var(--text3)}
.mtg-detail{flex:1;display:flex;flex-direction:column;overflow:hidden}
.mtg-detail-head{padding:10px 18px 9px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;gap:8px;align-items:center}
.mtg-detail-body{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:10px}
.mtg-section-label{font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
/* ACTIVITY HISTORY STYLE */
.act-block{background:var(--surface);border:1px solid var(--border-md);border-radius:var(--radius);overflow:hidden}
.act-block-head{padding:8px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.act-block-title{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#fff;flex:1}
.act-block-count{font-size:10px;background:rgba(255,255,255,.2);color:#fff;border-radius:10px;padding:1px 8px}
.act-history{display:flex;flex-direction:column}
.act-row{display:flex;align-items:flex-start;gap:10px;padding:8px 14px;border-bottom:1px solid var(--border)}
.act-row:last-child{border-bottom:none}
.act-date{font-size:11px;font-weight:600;color:var(--text3);min-width:80px;padding-top:1px}
.act-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;flex-shrink:0}
.act-text{flex:1;font-size:12.5px;color:var(--text2);line-height:1.5}
.act-del{background:none;border:1px solid #fca5a5;border-radius:4px;cursor:pointer;color:#ef4444;font-size:11px;padding:1px 5px;opacity:0;transition:opacity .1s}
.act-row:hover .act-del{opacity:1}
/* ADD NOTE SECTION */
.act-add{padding:12px 14px;background:var(--surface2);border-top:2px solid var(--border-md);display:flex;flex-direction:column;gap:8px}
.act-add-head{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text2)}
.act-add-row{display:flex;gap:8px;align-items:stretch}
.act-add-date{font-size:12px;padding:6px 8px;border-radius:var(--radius-sm);border:1px solid var(--border-md);background:var(--surface);color:var(--text);font-family:var(--font);outline:none}
.act-add-ta{flex:1;font-size:12.5px;padding:8px 10px;border-radius:var(--radius-sm);border:1px solid var(--border-md);background:var(--surface);color:var(--text);font-family:var(--font);outline:none;resize:none;min-height:70px;line-height:1.5}
.act-add-ta:focus{border-color:var(--border-strong)}
.act-add-btn{padding:6px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;border:none;cursor:pointer;color:#fff;font-family:var(--font);white-space:nowrap;align-self:flex-end}
.mtg-ta{width:100%;font-size:13px;padding:8px 10px;border-radius:var(--radius-sm);border:1px solid var(--border-md);background:var(--bg);color:var(--text);font-family:var(--font);outline:none;resize:none;line-height:1.6}
.mtg-ta:focus{border-color:var(--border-strong)}
.mtg-task-row{display:flex;align-items:center;gap:8px;padding:5px 8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:3px;font-size:12.5px}
/* ARCHIVE */
.archive-view{flex:1;overflow-y:auto;padding:16px 22px;display:flex;flex-direction:column;gap:4px}
.archive-section-head{font-size:10px;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);padding:8px 0 4px;border-top:1px solid var(--border);margin-top:8px}
.archive-section-head:first-child{border-top:none;margin-top:0}
.archive-row{display:flex;align-items:center;gap:10px;padding:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12.5px;color:var(--text3)}
.archive-text{flex:1;text-decoration:line-through;font-size:12px}
.archive-proj{font-size:10px;color:var(--text3);white-space:nowrap}
.archive-restore{background:none;border:1px solid var(--border-md);cursor:pointer;color:var(--text3);font-size:11px;padding:2px 7px;border-radius:4px;font-family:var(--font)}
.archive-restore:hover{background:var(--surface2);color:var(--text2)}
</style>
</head>
<body>
<div class="topbar">
  <button class="btn mob-menu-btn" onclick="toggleSidebar()" style="font-size:18px;padding:4px 8px;border:none;background:none;color:var(--text)">☰</button>
  <div class="logo">Workspace <em>/ projects</em></div>
  <div class="spacer"></div>
  <input class="sync-url" id="urlInput" placeholder="Paste Apps Script URL to sync..."/>
  <button class="btn dark" onclick="connectSheet()">Connect</button>
  <button class="btn" onclick="loadFromSheets()">↺ Load</button>
  <span class="badge none" id="syncBadge">not connected</span>
  <button class="btn" onclick="toggleDark()" id="darkBtn" title="Toggle dark mode" style="padding:5px 8px;font-size:14px">🌙</button>
  <button class="btn" onclick="showSyncMenu(event)" title="Sync tools" style="padding:5px 8px;font-size:13px">⚙</button>
</div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sb-head" style="display:flex;align-items:center;justify-content:space-between;padding-right:10px">
      Projects
      <button class="btn sm mob-menu-btn" onclick="toggleSidebar()" style="font-size:16px;padding:2px 6px;border:none;background:none;color:var(--text3)">✕</button>
    </div>
    <div class="proj-list" id="projList"></div>
    <div id="addProjArea"></div>
  </div>
  <div class="main">
    <div class="proj-header">
      <input class="proj-title" id="projTitleInput" placeholder="Project name" oninput="updateTitle(this.value)"/>
      <button class="btn sm" onclick="sendToClaude()" title="Send phase to Claude for deck/summary">✦ Send to Claude ↗</button>
    </div>
    <div class="main-tabs">
      <span class="main-tab active" id="mtTasks" onclick="switchMainTab('tasks')">☑ Tasks</span>
      <span class="main-tab" id="mtCalendar" onclick="switchMainTab('calendar')">📅 Calendar</span>
      <span class="main-tab" id="mtMeetings" onclick="switchMainTab('meetings')">📋 Meetings</span>
      <span class="main-tab" id="mtArchive" onclick="switchMainTab('archive')">🗄 Archive</span>
    </div>
    <div class="phase-bar" id="phaseBar"></div>
    <div class="content">
      <div class="tasks-panel mob-active" id="tasksPanel">
        <div class="panel-row">
          <span class="panel-label" id="panelLabel">Tasks &amp; Questions</span>
          <button class="btn sm" id="importToggleBtn" onclick="toggleImport()">⬇ Import outline</button>
        </div>
        <div id="importArea" style="display:none">
          <div class="import-area">
            <div class="import-hint" style="font-size:12px;color:var(--text2)">Use <strong>## Phase Name</strong> to create phases, then tasks and subtasks under each. Or paste any outline without phases.</div>
            <textarea class="import-ta" id="importTa" placeholder="## Phase One&#10;Task one&#10;  Subtask&#10;Task two&#10;&#10;## Phase Two&#10;Task three"></textarea>
            <div class="import-row">
              <span class="import-hint">Click Preview to see how it will be parsed</span>
              <button class="btn sm" onclick="cancelImport()">Cancel</button>
              <button class="btn sm" onclick="previewImport()">Preview</button>
              <button class="btn dark sm" onclick="runImport()">Import tasks</button>
            </div>
          </div>
          <div id="importPreviewWrap" style="display:none;margin-top:6px;background:var(--surface);border:1px solid var(--border-md);border-radius:var(--radius);padding:10px 12px;max-height:200px;overflow-y:auto">
            <div id="importPreview"></div>
          </div>
        </div>
        <div class="add-row">
          <input class="add-inp" id="taskInput" placeholder="Add a task and press Enter..." onkeydown="handleAddKey(event)"/>
          <div class="type-toggle">
            <button class="type-btn active-task" id="typeTask" onclick="setAddType('task')">☑ Task</button>
            <button class="type-btn" id="typeQuestion" onclick="setAddType('question')">? Question</button>
          </div>
          <button class="btn dark" onclick="addItem()">+ Add</button>
        </div>
        <div class="task-list" id="taskList"></div>
      </div>
    </div>
    <!-- CALENDAR PANEL — inside .main so it fills correctly -->
    <div id="calendarPanel" style="display:none;flex:1;overflow:hidden;flex-direction:column">
      <!-- WEEK SQUARES STRIP -->
      <div id="weekStrip" style="padding:10px 20px 8px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0">
        <div class="week-grid" id="weekGrid"></div>
      </div>
      <!-- TWO COLUMN: left=today+thisweek, right=quickadd(sticky)+someday+unscheduled -->
      <div style="flex:1;overflow:hidden;display:flex;gap:0">
        <!-- LEFT COLUMN: scrollable -->
        <div id="calLeft" style="flex:1;overflow-y:auto;padding:14px 10px 14px 20px;display:flex;flex-direction:column;gap:14px;border-right:1px solid var(--border)">
          <div id="calTodaySection"></div>
          <div id="calWeekSection"></div>
          <div id="calSomedaySection"></div>
          <div id="calUnschedSection"></div>
        </div>
        <!-- RIGHT COLUMN: quick add sticky top, then overflow -->
        <div id="calRight" style="width:320px;min-width:280px;display:flex;flex-direction:column;overflow:hidden">
          <div id="calQaSticky" style="padding:14px 20px 10px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)"></div>
          <div style="flex:1;overflow-y:auto;padding:10px 20px 14px;display:flex;flex-direction:column;gap:10px" id="calRightScroll"></div>
        </div>
      </div>
      <div class="cal-view" id="calView" style="display:none"></div>
    </div>
    <!-- MEETINGS PANEL -->
    <div id="meetingsPanel" style="display:none;flex:1;overflow:hidden;flex-direction:column">
      <div id="meetingsView" style="flex:1;overflow:hidden;display:flex"></div>
    </div>
    <!-- ARCHIVE PANEL — inside .main -->
    <div id="archivePanel" style="display:none;flex:1;overflow:hidden;flex-direction:column">
      <div class="archive-view" id="archiveView"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<button class="quick-capture-btn" onclick="showQuickCapture()" title="Quick add task (any project)">＋</button>

<!-- MOBILE BOTTOM TAB BAR -->
<div class="mob-tab-bar">
  <button class="mob-tab active" id="mobTabTasks" onclick="mobSwitchTab('tasks')">
    <span class="mob-tab-icon">☑</span>Tasks
  </button>
  <button class="mob-tab" id="mobTabNotes" onclick="mobSwitchTab('notes')">
    <span class="mob-tab-icon">📝</span>Notes
  </button>
  <button class="mob-tab" id="mobTabAdd" onclick="focusAddTask()">
    <span class="mob-tab-icon">＋</span>Add
  </button>
  <button class="mob-tab" id="mobTabClaude" onclick="sendToClaude()">
    <span class="mob-tab-icon">✦</span>Claude
  </button>
  <button class="mob-tab" id="mobTabSync" onclick="showMobSync()">
    <span class="mob-tab-icon">☁</span>Sync
  </button>
</div>

<script>
const COLORS=['#7F77DD','#1D9E75','#D85A30','#378ADD','#D4537E','#BA7517','#639922','#888780'];
const PHASE_COLORS=['#888780','#7F77DD','#1D9E75','#D85A30','#378ADD','#D4537E','#BA7517','#639922'];
const DUE_CYCLE=['none','today','week','someday'];
const DUE_LABELS={none:'Due',today:'Today',week:'This week',someday:'Someday'};
let scriptUrl=localStorage.getItem('ws_script_url')||'';
let driveScriptUrl=localStorage.getItem('ws_drive_url')||'';
let saveTimer=null;
let syncStatus='none'; // declared early so showMobSync can reference it
let expandedTasks={};
let editingTask=null;
let editingSubtask=null;
let addType='task';
let activeTab='notes';
let dragSrcId=null;
let showImport=false;
let activeMeeting=null;

let state={
  projects:[],meetings:[],
  activeProject:null,addingProj:false,newProjName:'',newProjColor:COLORS[0]
};

function getProj(){return state.projects.find(p=>p.id===state.activeProject)||null}
function getPhaseKey(){const p=getProj();return(p&&p.phases&&p.phases.length)?p.phases[p.activePhase]||p.phases[0]:''}

// Returns array of {phase, tasks} groups. If no ## markers, one group with phase=null
function parseOutlineWithPhases(raw){
  const lines=raw.split('\n');
  const groups=[];
  let currentGroup=null;

  const startGroup=(phaseName)=>{
    currentGroup={phase:phaseName,tasks:[],lastTask:null,inCode:false,codeLines:[],pendingNote:''};
    groups.push(currentGroup);
  };
  // start a default group for content before any ## line
  startGroup(null);

  const flush=(g)=>{if(g.pendingNote.trim()&&g.lastTask){g.lastTask.note=(g.lastTask.note?g.lastTask.note+'\n':'')+g.pendingNote.trim();g.pendingNote='';}};
  const newTask=(g,text)=>{flush(g);const t={id:'t'+Date.now()+uid(),text,type:'task',done:false,highlighted:false,subtasks:[],note:'',files:[]};g.tasks.push(t);g.lastTask=t;return t;};
  const newSub=(g,text)=>{if(!g.lastTask)newTask(g,text);else g.lastTask.subtasks.push({id:'s'+Date.now()+uid(),text,done:false});};

  lines.forEach(line=>{
    const g=currentGroup;

    // ## Phase marker — start new group
    if(/^##\s+/.test(line.trim())){
      flush(g);
      const phaseName=line.trim().replace(/^##\s+/,'').replace(/:$/,'').trim();
      startGroup(phaseName);
      return;
    }

    // code fences
    if(/^```/.test(line.trim())){
      if(g.inCode){
        const code=g.codeLines.join('\n').trim();
        if(code&&g.lastTask){g.codeLines.filter(l=>l.trim()).forEach(l=>newSub(g,l.trim()));}
        g.codeLines=[];g.inCode=false;
      } else {g.inCode=true;g.codeLines=[];}
      return;
    }
    if(g.inCode){g.codeLines.push(line);return;}
    if(!line.trim()){flush(g);return;}

    const trimmed=line.trim();
    const indent=line.search(/\S/);

    // single # = top-level task (not phase)
    if(/^#\s/.test(trimmed)){newTask(g,trimmed.replace(/^#\s*/,'').replace(/:$/,''));return;}

    // numbered items
    const numMatch=trimmed.match(/^(\d+)[\.\)]\s+(.*)/);
    if(numMatch){
      const text=numMatch[2].trim();if(!text)return;
      if(indent>=3&&g.lastTask)newSub(g,text);else newTask(g,text);
      return;
    }

    // bullets
    const bullMatch=trimmed.match(/^[-\*\+]\s+(.*)/);
    if(bullMatch){
      const text=bullMatch[1].trim();if(!text)return;
      if(indent>=2&&g.lastTask)newSub(g,text);else newTask(g,text);
      return;
    }

    // letter lists
    const alphaMatch=trimmed.match(/^[a-z][\.\)]\s+(.*)/i);
    if(alphaMatch){newSub(g,alphaMatch[1].trim());return;}

    // colon-terminated short header → task
    if(/^[A-Za-z][^:\n]{0,50}:$/.test(trimmed)&&trimmed.split(' ').length<=7){
      newTask(g,trimmed.replace(/:$/,''));return;
    }

    // short standalone line → task
    if(trimmed.length<=80&&!/[.!]$/.test(trimmed)&&trimmed.split(' ').length<=12){
      if(!g.lastTask||indent===0){newTask(g,trimmed);return;}
    }

    // prose → note
    if(g.lastTask)g.pendingNote+=(g.pendingNote?' ':'')+trimmed;
    else newTask(g,trimmed);
  });
  flush(currentGroup);

  // remove empty default group if nothing before first ##
  return groups.filter(g=>g.tasks.length>0||(g.phase&&g.phase!==null));
}

// legacy wrapper for single-phase parsing
function parseOutline(raw){
  const groups=parseOutlineWithPhases(raw);
  const all=[];groups.forEach(g=>all.push(...g.tasks));
  return all;
}

function previewImport(){
  const raw=document.getElementById('importTa').value;
  if(!raw.trim())return;
  const groups=parseOutlineWithPhases(raw);
  const wrap=document.getElementById('importPreviewWrap');
  const prev=document.getElementById('importPreview');
  wrap.style.display='block';
  const hasPhases=groups.some(g=>g.phase);
  const totalTasks=groups.reduce((n,g)=>n+g.tasks.length,0);
  if(!totalTasks){prev.innerHTML='<div style="font-size:12px;color:var(--text3)">Nothing to import</div>';return;}
  prev.innerHTML=`<div style="font-size:11px;color:var(--text3);margin-bottom:8px">${hasPhases?groups.filter(g=>g.phase).length+' phases, ':''} ${totalTasks} tasks detected — review then click Import</div>`
    +groups.filter(g=>g.tasks.length).map(g=>`
    ${g.phase?`<div style="font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#7F77DD;padding:6px 0 4px">⬡ Phase: ${esc(g.phase)}</div>`:''}
    ${g.tasks.map((t,i)=>`
      <div style="padding:5px 8px;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:3px;font-size:12px">
        <div style="display:flex;gap:6px;align-items:center">
          <span style="color:var(--text3);font-size:10px;min-width:16px">${i+1}</span>
          <span style="flex:1;color:var(--text)">${esc(t.text)}</span>
        </div>
        ${t.subtasks.map(s=>`<div style="padding:2px 0 0 22px;color:var(--text2);font-size:11px">↳ ${esc(s.text)}</div>`).join('')}
        ${t.note?`<div style="padding:2px 0 0 22px;color:var(--text3);font-size:11px;font-style:italic">note: ${esc(t.note.slice(0,80))}${t.note.length>80?'…':''}</div>`:''}
      </div>`).join('')}
    `).join('');
}

function runImport(){
  const raw=document.getElementById('importTa').value;
  if(!raw.trim())return;
  const groups=parseOutlineWithPhases(raw);
  const totalTasks=groups.reduce((n,g)=>n+g.tasks.length,0);
  if(!totalTasks){showToast('Nothing found to import');return;}
  const p=getProj();
  let phasesCreated=0;
  let tasksImported=0;

  groups.forEach(g=>{
    // determine target phase
    let targetPhase=getPhaseKey();
    if(g.phase){
      if(!p.phases.includes(g.phase)){
        // create the phase
        p.phases.push(g.phase);
        if(!p.phaseColors)p.phaseColors={};
        p.phaseColors[g.phase]=PHASE_COLORS[p.phases.length%PHASE_COLORS.length];
        p.notes[g.phase]=[];p.tasks[g.phase]=[];
        phasesCreated++;
      }
      targetPhase=g.phase;
      p.activePhase=p.phases.indexOf(targetPhase);
    }
    if(!p.tasks[targetPhase])p.tasks[targetPhase]=[];
    p.tasks[targetPhase].push(...g.tasks);
    tasksImported+=g.tasks.length;
  });

  cancelImport();render();scheduleSave();
  showToast(`Imported ${tasksImported} tasks${phasesCreated?` across ${phasesCreated} new phases`:''}`);
}

// SEND TO CLAUDE
function buildExport(){
  const p=getProj();const ph=getPhaseKey();
  const tasks=(p.tasks[ph]||[]);
  const highlighted=tasks.filter(t=>t.highlighted).map(t=>'★ '+t.text).join('\n');
  const allTasks=tasks.map(t=>{
    let s=(t.done?'[done] ':'[ ] ')+(t.type==='question'?'? ':'')+t.text;
    (t.subtasks||[]).forEach(sub=>s+='\n    - '+(sub.done?'[done] ':'')+sub.text);
    if(t.note)s+='\n    Note: '+t.note;
    return s;
  }).join('\n');
  const notes=(p.notes[ph]||[]).map(n=>n.text).join('\n');
  return`Project: ${p.name}\nPhase: ${ph}\n\n${highlighted?'Highlights:\n'+highlighted+'\n\n':''}Tasks:\n${allTasks}\n\n${notes?'Phase notes:\n'+notes:''}`;
}

function sendToClaude(){
  const msg=buildExport();
  // show export panel
  const existing=document.getElementById('exportPanel');if(existing)existing.remove();
  const div=document.createElement('div');div.id='exportPanel';
  div.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:400;display:flex;align-items:center;justify-content:center';
  div.innerHTML=`<div style="background:var(--surface);border-radius:var(--radius);padding:22px 24px;width:520px;max-height:80vh;display:flex;flex-direction:column;gap:14px;box-shadow:0 12px 40px rgba(0,0,0,.2)">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:14px;font-weight:500;flex:1">Send to Claude</span>
      <button class="btn sm" onclick="document.getElementById('exportPanel').remove()">✕ Close</button>
    </div>
    <p style="font-size:12px;color:var(--text2);line-height:1.5">Copy the export below, then paste it into a Claude chat and add your question.</p>
    <textarea id="exportText" style="font-size:12px;font-family:var(--mono);padding:10px;border:1px solid var(--border-md);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);resize:none;height:220px;outline:none;line-height:1.5">${esc(msg)}</textarea>

function copyExport(){
  const txt=document.getElementById('exportText');
  if(!txt)return;
  navigator.clipboard.writeText(txt.value).then(()=>{
    const btn=document.getElementById('copyExportBtn');
    if(btn){btn.textContent='✓ Copied!';setTimeout(()=>{if(btn)btn.textContent='⎘ Copy to clipboard'},2000);}
  });
}
function openInClaude(){
  navigator.clipboard.writeText(document.getElementById('exportText').value).then(()=>{
    window.open('https://claude.ai/new','_blank');
    showToast('Copied — paste into the new Claude tab');
  });
}

// PROJECT DRAG REORDER
let projDragSrc=null;
function projDragStart(e,id){projDragSrc=id;setTimeout(()=>{const el=document.getElementById('pi_'+id);if(el)el.style.opacity='.4'},0)}
function projDragOver(e,id){e.preventDefault();if(id===projDragSrc)return;const el=document.getElementById('pi_'+id);if(el)el.style.borderTop='2px solid var(--accent)'}
function projDragLeave(e,id){const el=document.getElementById('pi_'+id);if(el)el.style.borderTop=''}
function projDrop(e,id){
  e.preventDefault();
  const el=document.getElementById('pi_'+id);if(el){el.style.borderTop='';el.style.opacity='1';}
  if(!projDragSrc||projDragSrc===id)return;
  const si=state.projects.findIndex(p=>p.id===projDragSrc);
  const di=state.projects.findIndex(p=>p.id===id);
  if(si<0||di<0)return;
  const[moved]=state.projects.splice(si,1);state.projects.splice(di,0,moved);
  projDragSrc=null;renderSidebar();saveProjectOrder();scheduleSave();
}
function projDragEnd(e){
  // clean up all opacity/borders
  state.projects.forEach(p=>{const el=document.getElementById('pi_'+p.id);if(el){el.style.opacity='1';el.style.borderTop='';}});
  projDragSrc=null;
}

const PROJ_STATUSES=[
  {key:'active',label:'Active',color:'#1D9E75'},
  {key:'waiting',label:'Waiting',color:'#BA7517'},
  {key:'backburner',label:'Back burner',color:'#888780'},
  {key:'done',label:'Done',color:'#378ADD'},
];
function getProjStatus(pr){return pr.status||'active';}
function getStatusInfo(key){return PROJ_STATUSES.find(s=>s.key===key)||PROJ_STATUSES[0];}
function cycleStatus(e,pid){
  e.stopPropagation();
  const p=state.projects.find(pr=>pr.id===pid);if(!p)return;
  const idx=PROJ_STATUSES.findIndex(s=>s.key===(p.status||'active'));
  p.status=PROJ_STATUSES[(idx+1)%PROJ_STATUSES.length].key;
  renderSidebar();
  // Save immediately
  clearTimeout(saveTimer);_saveVersion++;pushToSheet();
}

function renderPhases(p){
  if(!p)return;
  const bar=document.getElementById('phaseBar');
  if(!bar)return;
  const hasHighlights=p.phases.some(ph=>(p.tasks[ph]||[]).some(t=>t.highlighted&&!t.done));
  bar.innerHTML=p.phases.map((ph,i)=>{
    const tasks=p.tasks[ph]||[];const allDone=tasks.filter(t=>t.type==='task').length>0&&tasks.filter(t=>t.type==='task').every(t=>t.done);
    const col=(p.phaseColors&&p.phaseColors[ph])||'#888780';
    return`<span class="phase-chip ${i===p.activePhase?'active':''} ${allDone&&i!==p.activePhase?'done':''}" style="background:${col};border-color:${col}" onclick="selPhase(${i})" oncontextmenu="showPhaseCtx(event,${i})">${esc(ph)}</span>`;
  }).join('')
  +(hasHighlights?`<span class="phase-chip highlights-chip ${p.activePhase===9999?'active':''}" onclick="selHighlightsPhase()" title="All highlighted takeaways">★ Highlights</span>`:'')
  +`<input class="new-phase-inp" placeholder="+ phase" onkeydown="if(event.key==='Enter'&&this.value.trim()){addPhase(this.value.trim());this.value=''}" onblur="this.value=''"/>`;
}

let viewingHighlights=false;
function selHighlightsPhase(){viewingHighlights=true;renderTasksHighlights();renderPhaseChipsHighlight();}
function renderPhaseChipsHighlight(){
  // re-render just to mark highlights chip active — easiest to just re-render phases
  const p=getProj();if(!p)return;
  renderPhases(p);
  // mark highlights chip active
  const chips=document.querySelectorAll('.highlights-chip');
  chips.forEach(c=>c.classList.add('active'));
  // unmark others
  document.querySelectorAll('.phase-chip:not(.highlights-chip)').forEach(c=>c.classList.remove('active'));
}
function renderTasksHighlights(){
  const p=getProj();
  if(!p)return;
  const allHL=[];
  p.phases.forEach(ph=>{
    (p.tasks[ph]||[]).filter(t=>t.highlighted&&!t.done).forEach(t=>allHL.push({...t,_phase:ph}));
  });
  const list=document.getElementById('taskList');
  document.getElementById('panelLabel').textContent='★ Highlights across all phases';
  list.innerHTML=allHL.length
    ?allHL.map(t=>renderTaskCard(t,true)).join('')
    :`<div class="empty">No highlights yet — star tasks to collect them here</div>`;
}

function renderTasks(p){
  if(!p)return;
  viewingHighlights=false;
  const ph=getPhaseKey();
  const allItems=p.tasks[ph]||[];
  const highlighted=allItems.filter(t=>t.highlighted&&!t.done);
  const regular=allItems.filter(t=>!t.highlighted||t.done);
  const list=document.getElementById('taskList');
  document.getElementById('panelLabel').textContent='Tasks & Questions';
  let html='';
  if(highlighted.length){
    html+=`<div class="highlights-section"><div class="highlights-header">★ Highlights / takeaways</div>${highlighted.map(t=>renderTaskCard(t,false)).join('')}</div>`;
  }
  html+=regular.length?regular.map(t=>renderTaskCard(t,false)).join(''):`<div class="empty">No tasks yet — add one above</div>`;
  list.innerHTML=html;
}

// PROJECT ORDER — persisted separately in localStorage so reloads don't scramble it
function saveProjectOrder(){
  try{localStorage.setItem('ws_proj_order',JSON.stringify(state.projects.map(p=>p.id)));}catch(e){}
}
function applyProjectOrder(projects){
  try{
    const order=JSON.parse(localStorage.getItem('ws_proj_order')||'[]');
    if(!order.length)return projects;
    const map=Object.fromEntries(projects.map(p=>[p.id,p]));
    const ordered=[];
    order.forEach(id=>{if(map[id]){ordered.push(map[id]);delete map[id];}});
    Object.values(map).forEach(p=>ordered.push(p)); // new projects not in saved order go at end
    return ordered;
  }catch(e){return projects;}
}
function savePosition(){
  const p=getProj();if(!p)return;
  const phaseKey=p.phases[p.activePhase]||'';
  try{localStorage.setItem('ws_position',JSON.stringify({pid:p.id,name:p.name,phase:p.activePhase,phaseKey}));}catch(e){}
}
function restorePosition(){
  try{
    const saved=JSON.parse(localStorage.getItem('ws_position')||'{}');
    if(!saved.pid&&!saved.name)return;
    let p=state.projects.find(pr=>pr.id===saved.pid);
    if(!p&&saved.name)p=state.projects.find(pr=>pr.name===saved.name);
    if(p){
      state.activeProject=p.id;
      // Try to match phase by name first (survives reorders), then by index
      let phaseIdx=saved.phaseKey?p.phases.indexOf(saved.phaseKey):-1;
      if(phaseIdx<0)phaseIdx=Math.min(saved.phase||0,p.phases.length-1);
      p.activePhase=Math.max(0,phaseIdx);
    }
  }catch(e){}
}

// FILES
function handleFileDrop(e,tid){

  uploadFiles(e.dataTransfer.files,tid);

function handleFileInput(e,tid){uploadFiles(e.target.files,tid);}
async function uploadFiles(files,tid){
  if(!files||!files.length)return;
  const arr=Array.from(files);
  for(const file of arr){
    await uploadOneFile(file,tid);
  }
}
async function uploadOneFile(file,tid){
  showToast('Uploading '+file.name+'...');
  // Always try Drive upload via JSONP if script URL available
  if(scriptUrl){
    try{
      const b64=await toBase64(file);
      const result=await uploadToGDriveJSONP(file.name,file.type,b64);
      if(result&&result.url){
        attachFile(tid,file.name,result.url);
        showToast(file.name+' uploaded to Drive ✓');
        return;
      }
    }catch(e){
      console.log('Drive upload failed:',e);
    }
  }
  // Fallback: store image as inline preview, other files as name only
  if(file.type.startsWith('image/')){
    const url=await toDataURL(file);
    attachFile(tid,file.name,url);
    showToast(file.name+' saved as preview');
  } else {
    attachFile(tid,file.name,'');
    showToast(file.name+' name saved — Drive upload failed, try reconnecting');
  }
}

function uploadToGDriveJSONP(filename,mimeType,b64data){
  return new Promise((resolve,reject)=>{
    const cb='upload_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const timeout=setTimeout(()=>{
      delete window[cb];reject(new Error('Upload timeout'));
    },30000);
    window[cb]=function(data){
      clearTimeout(timeout);delete window[cb];
      if(data&&data.url)resolve(data);
      else reject(new Error(data&&data.error||'No URL returned'));
    };
    // Send via POST with JSONP callback
    const form=document.createElement('form');
    form.method='POST';
    form.action=scriptUrl;
    form.target='upload_frame_'+cb;
    form.style.display='none';
    // Build payload with callback
    const inp=document.createElement('input');
    inp.type='hidden';inp.name='';
    // Use GET with callback for small files, POST body for larger
    // For reliability use a script tag with encoded data
    const frame=document.createElement('iframe');
    frame.name='upload_frame_'+cb;
    frame.style.display='none';
    document.body.appendChild(frame);
    // POST the data and use fetch to get response
    fetch(scriptUrl,{
      method:'POST',
      mode:'no-cors',
      body:JSON.stringify({action:'uploadFile',filename,mimeType,data:b64data,callback:cb})
    }).then(()=>{
      // no-cors can't read response — fall back to JSONP GET for status
      const s=document.createElement('script');
      s.src=scriptUrl+'?action=getUploadStatus&callback='+cb+'&filename='+encodeURIComponent(filename)+'&t='+Date.now();
      s.onerror=()=>{clearTimeout(timeout);delete window[cb];frame.remove();reject(new Error('Script error'));};
      document.head.appendChild(s);
    }).catch(err=>{clearTimeout(timeout);delete window[cb];frame.remove();reject(err);});
  });
}
function toBase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);})}
function toDataURL(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file);})}
function attachFile(tid,name,url){
  const p=getProj();const ph=viewingHighlights?findTaskPhase(tid):getPhaseKey();
  const t=(p.tasks[ph]||[]).find(t=>t.id===tid);
  if(!t)return;if(!t.files)t.files=[];
  t.files.push({name,url});
  if(viewingHighlights)renderTasksHighlights();else renderTasks(p);scheduleSave();
}
function removeFile(tid,fi){
  const p=getProj();const ph=viewingHighlights?findTaskPhase(tid):getPhaseKey();
  const t=(p.tasks[ph]||[]).find(t=>t.id===tid);
  if(t){t.files.splice(fi,1);if(viewingHighlights)renderTasksHighlights();else renderTasks(p);scheduleSave();}
}

function renamePhase(i){
  const p=getProj();const oldName=p.phases[i];
  const existing=document.getElementById('renamePhaseModal');if(existing)existing.remove();
  const div=document.createElement('div');div.id='renamePhaseModal';
  div.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:400;display:flex;align-items:center;justify-content:center';
  div.innerHTML=`<div style="background:var(--surface);border-radius:var(--radius);padding:22px 24px;width:320px;display:flex;flex-direction:column;gap:12px;box-shadow:0 12px 40px rgba(0,0,0,.2)">
    <div style="font-size:14px;font-weight:500">Rename phase</div>
    <input id="renamePhaseInp" style="font-size:13px;padding:8px 10px;border-radius:var(--radius-sm);border:1px solid var(--border-md);background:var(--bg);color:var(--text);font-family:var(--font);outline:none;width:100%" value="${esc(oldName)}" onkeydown="if(event.key==='Enter')doRenamePhase(${i},this.value);if(event.key==='Escape')document.getElementById('renamePhaseModal').remove()"/>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="document.getElementById('renamePhaseModal').remove()">Cancel</button>
      <button class="btn dark" onclick="doRenamePhase(${i},document.getElementById('renamePhaseInp').value)">Rename</button>
    </div>
  </div>`;
  document.body.appendChild(div);
  setTimeout(()=>{const el=document.getElementById('renamePhaseInp');if(el){el.focus();el.select();}},30);

function doRenamePhase(i,newName){
  newName=newName.trim();if(!newName)return;
  const p=getProj();const oldName=p.phases[i];
  if(newName===oldName){document.getElementById('renamePhaseModal').remove();return;}
  // rename in all data structures
  p.phases[i]=newName;
  p.tasks[newName]=p.tasks[oldName]||[];delete p.tasks[oldName];
  p.notes[newName]=p.notes[oldName]||[];delete p.notes[oldName];
  if(p.phaseColors){p.phaseColors[newName]=p.phaseColors[oldName]||'#888780';delete p.phaseColors[oldName];}
  document.getElementById('renamePhaseModal').remove();
  render();scheduleSave();
}
function movePhase(i,dir){
  const p=getProj();const j=i+dir;
  if(j<0||j>=p.phases.length)return;
  [p.phases[i],p.phases[j]]=[p.phases[j],p.phases[i]];
  if(p.activePhase===i)p.activePhase=j;
  else if(p.activePhase===j)p.activePhase=i;
  render();scheduleSave();
}
function showTaskCtx(e,id){
  e.preventDefault();e.stopPropagation();
  const p=getProj();const ph=viewingHighlights?findTaskPhase(id):getPhaseKey();

function exportProject(pid,format){
  const p=state.projects.find(pr=>pr.id===pid)||getProj();
  if(!p)return;
  let content='',filename='',mime='';
  if(format==='markdown'){
    content=`# ${p.name}\n\n`;
    p.phases.forEach(ph=>{
      content+=`## ${ph}\n\n`;
      const tasks=p.tasks[ph]||[];
      const notes=(p.notes[ph]||[]);
      tasks.forEach(t=>{
        content+=`- [${t.done?'x':' '}] ${t.type==='question'?'**?** ':''}${t.text}\n`;
        (t.subtasks||[]).forEach(s=>content+=`  - [${s.done?'x':' '}] ${s.text}\n`);
        if(t.note)content+=`  > ${t.note}\n`;
        if((t.files||[]).length)t.files.forEach(f=>content+=`  > 📎 [${f.name}](${f.url})\n`);
      });
      if(notes.length){content+=`\n**Notes:**\n`;notes.forEach(n=>content+=`> ${n.text}\n`);}
      content+='\n';
    });
    filename=p.name.replace(/[^a-z0-9]/gi,'_')+'.md';mime='text/markdown';
  }
  if(format==='json'){
    content=JSON.stringify(p,null,2);
    filename=p.name.replace(/[^a-z0-9]/gi,'_')+'.json';mime='application/json';
  }
  if(format==='csv'){
    const rows=[['Project','Phase','Type','Task','Subtask','Done','Note']];
    p.phases.forEach(ph=>{
      (p.tasks[ph]||[]).forEach(t=>{
        rows.push([p.name,ph,t.type,t.text,'',t.done?'yes':'no',t.note||'']);
        (t.subtasks||[]).forEach(s=>rows.push([p.name,ph,'subtask',t.text,s.text,s.done?'yes':'no','']));
      });
    });
    content=rows.map(r=>r.map(c=>'"'+String(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');
    filename=p.name.replace(/[^a-z0-9]/gi,'_')+'.csv';mime='text/csv';
  }
  const blob=new Blob([content],{type:mime});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1000);
  showToast('Exported '+filename);
}

function dragDrop(e,id){
  e.preventDefault();
  const el=document.getElementById('tc_'+id);if(el)el.classList.remove('drag-over');
  if(!dragSrcId||dragSrcId===id)return;
  const p=getProj();const ph=getPhaseKey();
  const tasks=p.tasks[ph]||[];
  const si=tasks.findIndex(t=>t.id===dragSrcId);const di=tasks.findIndex(t=>t.id===id);

  const[moved]=tasks.splice(si,1);tasks.splice(di,0,moved);
  dragSrcId=null;renderTasks(p);scheduleSave();
}

    const owners=[...new Set([...selectedAtts,...(state.extraOwners||[])])];
    return`<option value="">— Owner —</option>`+
      owners.map(o=>`<option value="${o}" ${selected===o?'selected':''}>${o}</option>`).join('')+
      `<option value="__add__">+ Add person...</option>`;
  }

  // Task rows
  const taskRows=data.tasks.map((t,i)=>`
    <div class="mtg-task-row" style="${t.done?'opacity:.55':''}">
      <input type="checkbox" ${t.done?'checked':''} onchange="toggleRoomTask('${mt.id}',${i})" style="cursor:pointer;flex-shrink:0"/>
      <input value="${esc(t.text)}" placeholder="Action item..." style="flex:1;font-size:12.5px;border:none;background:none;font-family:var(--font);color:var(--text);outline:none;min-width:0;${t.done?'text-decoration:line-through':''}" oninput="updateRoomTask('${mt.id}',${i},'text',this.value)"/>
      <select onchange="updateRoomTask('${mt.id}',${i},'owner',this.value)" style="font-size:11px;border:1px solid var(--border-md);border-radius:4px;background:var(--bg);color:var(--text2);font-family:var(--font);padding:2px 6px;flex-shrink:0">
        ${getRoomOwnerOptions(t.owner)}
      </select>
      <button onclick="removeRoomTask('${mt.id}',${i})" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:0 3px;flex-shrink:0">×</button>
    </div>`).join('');

  const selNames=(data.attendees||[]).join(', ')||'none selected';

  return`<div class="mtg-detail" style="display:flex;flex-direction:column;overflow:hidden">
    <!-- HEADER -->
    <div class="mtg-detail-head" style="border-bottom:3px solid ${mt.color};flex-shrink:0">
      <span style="font-size:20px">${mt.icon}</span>
      <input value="${esc(mt.label)}" style="font-size:16px;font-weight:700;border:none;background:none;outline:none;font-family:var(--font);color:${mt.color};min-width:80px;max-width:200px" oninput="updateMeetingTypeName('${mt.id}',this.value)"/>
      <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;flex:1">
        <span style="font-size:11px;color:var(--text3);margin-right:2px">Attendees:</span>
        ${attBtns}

      <button class="btn sm" onclick="deleteMeetingType('${mt.id}')" style="color:#b33;flex-shrink:0">🗑</button>
    </div>

    <!-- TWO COLUMN BODY -->
    <div style="flex:1;display:flex;overflow:hidden;gap:0">

      <!-- LEFT: ACTIVITY HISTORY -->
      <div style="width:48%;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden">
        <div style="background:${mt.color};padding:8px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0">
          <span style="font-size:14px">${mt.icon}</span>
          <span style="font-size:11px;font-weight:700;color:#fff;letter-spacing:.06em;text-transform:uppercase;flex:1">Activity History</span>
          <span style="font-size:10px;background:rgba(255,255,255,.2);color:#fff;border-radius:10px;padding:1px 8px">${data.history.length} entr${data.history.length===1?'y':'ies'}</span>
        </div>
        <!-- History scroll -->
        <div style="flex:1;overflow-y:auto;min-height:0">
          ${histRows||`<div style="padding:14px;font-size:12px;color:var(--text3);font-style:italic">No entries yet</div>`}
        </div>
        <!-- Add note form pinned to bottom -->
        <div style="border-top:2px solid ${mt.color}33;padding:12px 14px;background:var(--surface2);flex-shrink:0">
          <div style="font-size:10px;font-weight:700;color:${mt.color};text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">— Add New Note</div>
          <textarea id="roomEntry_${mt.id}" placeholder="What happened? Updates? Next steps?" style="width:100%;font-size:12.5px;padding:8px 10px;border-radius:var(--radius-sm);border:1.5px solid ${mt.color}44;background:var(--surface);color:var(--text);font-family:var(--font);outline:none;resize:none;min-height:80px;line-height:1.5" onfocus="this.style.borderColor='${mt.color}'" onblur="this.style.borderColor='${mt.color}44'"></textarea>
          <div style="display:flex;gap:8px;margin-top:8px;align-items:center">
            <input type="date" id="roomEntryDate_${mt.id}" value="${new Date().toISOString().slice(0,10)}" style="font-size:12px;padding:5px 7px;border-radius:var(--radius-sm);border:1px solid var(--border-md);background:var(--surface);color:var(--text);font-family:var(--font);outline:none"/>
            <button onclick="addRoomEntry('${mt.id}')" style="flex:1;padding:7px 0;border-radius:var(--radius-sm);font-size:12px;font-weight:600;border:none;background:${mt.color};color:#fff;cursor:pointer;font-family:var(--font)">Save Note</button>
          </div>
        </div>
      </div>

      <!-- RIGHT: TASKS + RECAP -->
      <div style="flex:1;display:flex;flex-direction:column;overflow-y:auto;min-width:0">

        <!-- ACTION ITEMS -->
        <div style="border-bottom:1px solid var(--border);flex-shrink:0">
          <div style="background:#1c1b18;padding:8px 14px;display:flex;align-items:center;gap:8px">

            <span style="font-size:11px;font-weight:700;color:#fff;letter-spacing:.06em;text-transform:uppercase;flex:1">Action Items</span>
            <button onclick="addRoomTask('${mt.id}')" style="background:rgba(255,255,255,.15);border:none;border-radius:4px;color:#fff;font-size:11px;padding:3px 10px;cursor:pointer;font-family:var(--font)">+ Add</button>
          </div>
          <div style="padding:8px 12px;display:flex;flex-direction:column;gap:3px;max-height:220px;overflow-y:auto">
            ${taskRows||'<div style="font-size:12px;color:var(--text3);padding:4px 0;font-style:italic">No action items yet</div>'}
          </div>
          <div style="padding:6px 12px 10px">
            <input id="roomNewTask_${mt.id}" placeholder="New action item — press Enter to add..." style="width:100%;font-size:12.5px;padding:7px 10px;border-radius:var(--radius-sm);border:1px solid var(--border-md);background:var(--bg);color:var(--text);font-family:var(--font);outline:none" onkeydown="if(event.key==='Enter')addRoomTask('${mt.id}')"/>

          </div>
          <div style="border:1px solid #1d4ed833;border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);padding:10px 12px;display:flex;flex-direction:column;gap:8px;background:var(--surface)">
            <textarea class="mtg-ta" style="min-height:80px" placeholder="Key decisions, summary bullets for the email..." oninput="updateRoomRecap('${mt.id}',this.value)">${esc(data.recap||'')}</textarea>
            <div style="font-size:11px;color:var(--text3)">To: <strong>${selNames}</strong></div>
            <div style="display:flex;gap:7px;flex-wrap:wrap">
              <button onclick="sendRoomEmail('${mt.id}')" style="padding:7px 16px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;border:none;background:#1d4ed8;color:#fff;cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:6px">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="white"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                Send via Gmail
              </button>
              <button onclick="previewRoomRecap('${mt.id}')" class="btn sm">👁 Preview</button>
              <button onclick="copyRoomRecap('${mt.id}')" class="btn sm">⎘ Copy</button>
            </div>
